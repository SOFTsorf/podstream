<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Lockscreen Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --text-main: #FFFFFF;
            --text-sub: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(30, 30, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: #000;
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- DYNAMISCHER HINTERGRUND --- */
        #bg-blur {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.6);
            z-index: 0;
            transition: background-image 0.8s ease-in-out;
        }

        /* Abdunkelung oben für die Uhrzeit (wie im Screenshot) */
        .top-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding: 50px 20px 30px;
            box-sizing: border-box;
        }

        /* --- UHRZEIT --- */
        .clock-area {
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .clock-time {
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }
        .clock-date {
            font-size: 20px;
            font-weight: 500;
            margin-top: 5px;
        }

        /* --- GROSSES COVER --- */
        .artwork-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 340px;
        }
        #artwork {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            object-fit: cover;
            transition: opacity 0.4s;
            cursor: pointer;
        }

        /* --- PLAYER KARTE (Glassmorphismus) --- */
        .player-card {
            width: 100%;
            max-width: 360px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* Titel & Artist */
        .track-info {
            text-align: center;
            margin-bottom: 20px;
        }
        #track-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #track-artist {
            font-size: 14px;
            color: var(--text-sub);
            margin: 0;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 10px;
            color: var(--text-sub);
            font-variant-numeric: tabular-nums;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
        }
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
        }
        .progress-dot {
            position: absolute;
            top: 50%;
            right: -3px;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .controls i {
            font-size: 24px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .controls i:active { opacity: 0.4; }
        .controls .fa-star, .controls .fa-podcast { font-size: 18px; color: var(--text-sub); }
        .controls .play-btn { font-size: 36px; }

        /* Lockscreen Bottom Buttons (Taschenlampe / Kamera) */
        .bottom-actions {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 360px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        /* Loader */
        #loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; z-index: 10; }
    </style>
</head>
<body>

    <div id="bg-blur"></div>
    <div class="top-gradient"></div>

    <div class="container">
        
        <div class="clock-area">
            <h1 class="clock-time" id="clock">12:14</h1>
            <div class="clock-date" id="date">Wed Jun 11</div>
        </div>

        <div id="loader"><i class="fas fa-spinner fa-spin"></i></div>

        <div class="artwork-container">
            <img id="artwork" src="" alt="Album Art" onclick="nextSong()">
        </div>

        <div class="player-card">
            <div class="track-info">
                <h2 id="track-title">Laden...</h2>
                <p id="track-artist">Bitte warten</p>
            </div>

            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill">
                        <div class="progress-dot"></div>
                    </div>
                </div>
                <span id="time-remaining">-0:00</span>
            </div>

            <div class="controls">
                <i class="fa-regular fa-star"></i>
                <i class="fas fa-backward-fill" onclick="prevSong()"></i>
                <i class="fas fa-play play-btn" id="play-btn" onclick="togglePlay()"></i>
                <i class="fas fa-forward-fill" onclick="nextSong()"></i>
                <i class="fas fa-podcast"></i>
            </div>
        </div>

        <div class="bottom-actions">
            <div class="action-btn"><i class="fas fa-flashlight"></i></div>
            <div class="action-btn"><i class="fas fa-camera"></i></div>
        </div>

    </div>

    <audio id="audio"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const progressFill = document.getElementById('progress-fill');
    
    let tracks = [];
    let currentIndex = 0;

    // Uhrzeit setzen wie auf dem Sperrbildschirm
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Zuverlässige Musik laden (iTunes API)
    async function loadMusic() {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('artwork').style.opacity = '0.3';
        
        try {
            // Suche nach Rock/Metal um den Vibe deiner Screenshots zu matchen
            const res = await fetch('https://itunes.apple.com/search?term=metal&entity=song&limit=15');
            const data = await res.json();
            tracks = data.results.filter(t => t.previewUrl); // Nur Tracks mit Audio
            
            if(tracks.length > 0) {
                loadTrack(0);
            }
        } catch (e) {
            document.getElementById('track-title').innerText = "Fehler beim Laden";
        }
    }

    function loadTrack(index) {
        if (!tracks[index]) return;
        currentIndex = index;
        const track = tracks[index];
        
        // Artwork in hoher Auflösung holen (600x600 statt 100x100)
        const highResArt = track.artworkUrl100.replace('100x100bb', '600x600bb');
        
        document.getElementById('track-title').innerText = track.trackName;
        document.getElementById('track-artist').innerText = track.artistName;
        document.getElementById('artwork').src = highResArt;
        document.getElementById('bg-blur').style.backgroundImage = `url(${highResArt})`;
        
        audio.src = track.previewUrl;
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('artwork').style.opacity = '1';

        // Autoplay versuchen
        audio.play().then(() => {
            playBtn.className = "fas fa-pause play-btn";
        }).catch(() => {
            playBtn.className = "fas fa-play play-btn";
        });
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.className = "fas fa-pause play-btn";
        } else {
            audio.pause();
            playBtn.className = "fas fa-play play-btn";
        }
    }

    function nextSong() {
        currentIndex = (currentIndex + 1) % tracks.length;
        loadTrack(currentIndex);
    }

    function prevSong() {
        currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(currentIndex);
    }

    // Fortschrittsbalken updaten (mit Negativ-Zeit rechts wie bei iOS)
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        const percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${percent}%`;
        
        document.getElementById('time-current').innerText = formatTime(audio.currentTime);
        
        const remaining = audio.duration - audio.currentTime;
        document.getElementById('time-remaining').innerText = "-" + formatTime(remaining);
    };

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    audio.onended = nextSong;

    // Start
    loadMusic();
</script>
</body>
</html>
