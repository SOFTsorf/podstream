<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PodStream Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000;
            --ios-card: #1C1C1E;
            --ios-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-sub: #8E8E93;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--ios-bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            padding: 60px 20px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 34px; font-weight: 800; letter-spacing: -1px; }

        /* --- CONTENT CARDS --- */
        .section-title { padding: 20px; font-size: 22px; font-weight: 700; }
        
        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px;
            gap: 15px;
            scroll-snap-type: x mandatory;
        }

        .card {
            min-width: 160px;
            scroll-snap-align: start;
        }

        .card img {
            width: 160px;
            height: 160px;
            border-radius: 22px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background: #2c2c2e;
        }

        .card-title {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- EPISODEN LISTE (DownAPK Style) --- */
        .list-container {
            margin: 20px;
            background: var(--ios-card);
            border-radius: 20px;
            padding: 10px 15px;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid #38383A;
        }

        .list-item:last-child { border-bottom: none; }

        .list-info { flex: 1; margin-right: 10px; }
        .list-info h4 { margin: 0; font-size: 15px; font-weight: 600; }
        .list-info p { margin: 4px 0 0; font-size: 12px; color: var(--text-sub); }

        .btn-play {
            background: #333;
            color: var(--ios-blue);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
        }

        /* --- DER NEUE iOS PLAYER (Full Screen) --- */
        #player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            transform: translateY(100%);
        }

        #player-overlay.active { display: flex; transform: translateY(0); }

        .player-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.5);
            z-index: -1;
            transform: scale(1.2);
        }

        .player-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        .player-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
        }

        .main-art {
            width: 85vw;
            height: 85vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .track-info { width: 100%; text-align: left; margin-bottom: 30px; }
        .track-info h2 { margin: 0; font-size: 22px; font-weight: 700; }
        .track-info p { margin: 5px 0 0; color: var(--ios-blue); font-size: 18px; }

        /* iOS Slider */
        .progress-area { width: 100%; margin-bottom: 30px; }
        input[type="range"] {
            width: 100%;
            accent-color: #fff;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 10px; }

        .player-controls {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 50px;
        }

        .player-controls i { font-size: 35px; cursor: pointer; transition: 0.2s; }
        .player-controls i:active { opacity: 0.5; }
        .play-trigger { font-size: 60px !important; }

        /* SEARCH */
        .search-bar {
            margin: 0 20px 20px;
            background: var(--ios-card);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: #fff;
            margin-left: 10px;
            font-size: 17px;
            width: 100%;
            outline: none;
        }

        .loader { width: 30px; height: 30px; border: 3px solid var(--glass); border-top-color: var(--ios-blue); border-radius: 50%; animation: spin 1s infinite linear; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">Podcasts</div>
    </header>

    <div class="search-bar">
        <i class="fas fa-search" style="color: #8e8e93;"></i>
        <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="if(event.key==='Enter') searchPodcasts()">
    </div>

    <div id="main-view">
        <div class="section-title">Für dich entdeckt</div>
        <div class="horizontal-scroll" id="trending-grid">
            </div>

        <div id="episode-section" style="display:none;">
            <div class="section-title" id="feed-title">Episoden</div>
            <div class="list-container" id="episode-list"></div>
        </div>
    </div>

    <div id="player-overlay">
        <div class="player-bg" id="p-bg"></div>
        <div class="player-header">
            <i class="fas fa-chevron-down" onclick="togglePlayer(false)"></i>
            <span style="font-size: 12px; font-weight: 600; opacity: 0.7;">JETZT LÄUFT</span>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <div class="player-content">
            <img src="" id="p-art" class="main-art">
            <div class="track-info">
                <h2 id="p-title">Titel der Episode</h2>
                <p id="p-author">Podcast Name</p>
            </div>

            <div class="progress-area">
                <input type="range" id="p-seek" value="0" step="1">
                <div class="time-labels">
                    <span id="p-current">0:00</span>
                    <span id="p-duration">0:00</span>
                </div>
            </div>

            <div class="player-controls">
                <i class="fas fa-backward-step" onclick="skip(-15)"></i>
                <i class="fas fa-play play-trigger" id="p-main-btn" onclick="togglePlay()"></i>
                <i class="fas fa-forward-step" onclick="skip(30)"></i>
            </div>
        </div>
    </div>

    <audio id="audio-engine"></audio>

<script>
    const audio = document.getElementById('audio-engine');
    const player = document.getElementById('player-overlay');
    
    // --- API FUNKTIONEN ---
    async function searchPodcasts() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        
        const grid = document.getElementById('trending-grid');
        grid.innerHTML = '<div class="loader"></div>';

        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=podcast&limit=10`);
            const data = await r.json();
            grid.innerHTML = "";
            data.results.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="loadFeed('${p.feedUrl}', '${p.artworkUrl600}', '${p.collectionName}')">
                        <img src="${p.artworkUrl600}" onerror="this.src='https://via.placeholder.com/160'">
                        <div class="card-title">${p.collectionName}</div>
                    </div>`;
            });
        } catch (e) { alert("Fehler beim Suchen."); }
    }

    async function loadFeed(url, art, name) {
        const list = document.getElementById('episode-list');
        document.getElementById('episode-section').style.display = "block";
        document.getElementById('feed-title').innerText = name;
        list.innerHTML = '<div class="loader"></div>';
        list.scrollIntoView({behavior: 'smooth'});

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const json = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(json.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            list.innerHTML = "";
            items.forEach((item, i) => {
                if(i > 20) return;
                const title = item.querySelector("title").textContent;
                const mp3 = item.querySelector("enclosure").getAttribute("url");
                list.innerHTML += `
                    <div class="list-item" onclick="initPlayer('${mp3}', '${title.replace(/'/g, "")}', '${art}', '${name}')">
                        <div class="list-info">
                            <h4>${title}</h4>
                            <p>Episode • Podcast</p>
                        </div>
                        <button class="btn-play">HÖREN</button>
                    </div>`;
            });
        } catch(e) { list.innerHTML = "Feed konnte nicht geladen werden."; }
    }

    // --- PLAYER LOGIK ---
    function initPlayer(url, title, art, author) {
        audio.src = url;
        audio.play();
        
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-author').innerText = author;
        document.getElementById('p-art').src = art;
        document.getElementById('p-bg').style.backgroundImage = `url(${art})`;
        
        document.getElementById('p-main-btn').className = "fas fa-pause play-trigger";
        togglePlayer(true);
    }

    function togglePlayer(show) {
        player.classList.toggle('active', show);
    }

    function togglePlay() {
        const btn = document.getElementById('p-main-btn');
        if(audio.paused) { audio.play(); btn.className = "fas fa-pause play-trigger"; }
        else { audio.pause(); btn.className = "fas fa-play play-trigger"; }
    }

    function skip(sec) { audio.currentTime += sec; }

    audio.ontimeupdate = () => {
        const seek = document.getElementById('p-seek');
        const cur = document.getElementById('p-current');
        const dur = document.getElementById('p-duration');
        
        seek.max = audio.duration || 0;
        seek.value = audio.currentTime;
        
        cur.innerText = formatTime(audio.currentTime);
        dur.innerText = formatTime(audio.duration);
    };

    function formatTime(s) {
        if(isNaN(s)) return "0:00";
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60);
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    document.getElementById('p-seek').oninput = (e) => audio.currentTime = e.target.value;

    // Start-Inhalt
    async function init() {
        const grid = document.getElementById('trending-grid');
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=top&entity=podcast&limit=6&country=de`);
            const data = await r.json();
            grid.innerHTML = "";
            data.results.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="loadFeed('${p.feedUrl}', '${p.artworkUrl600}', '${p.collectionName}')">
                        <img src="${p.artworkUrl600}">
                        <div class="card-title">${p.collectionName}</div>
                    </div>`;
            });
        } catch(e) {}
    }

    init();
</script>
</body>
</html>
