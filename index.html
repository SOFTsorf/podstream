<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PodStream">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PodStream - iTunes Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-blue: #0A84FF;
            --ios-text: #FFFFFF;
            --ios-subtext: #8E8E93;
            --ios-separator: #38383A;
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(20, 20, 20, 0.7);
            --radius-l: 32px;
            --radius-m: 18px;
            --header-height: 100px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            margin: 0; background: var(--ios-bg); color: var(--ios-text); 
            padding-bottom: 140px; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            z-index: 1000; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            transition: 0.4s; background: var(--ios-bg);
        }
        header.scrolled { height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: var(--glass-border); }
        .logo { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
        header.scrolled .logo { font-size: 22px; }
        .header-spacer { height: var(--header-height); }

        /* SEARCH OVERLAY */
        .search-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(40px);
            z-index: 5000; opacity: 0; pointer-events: none; transition: 0.3s; padding-top: 60px;
        }
        .search-bar.active { opacity: 1; pointer-events: auto; }
        .search-box { display: flex; padding: 0 20px; gap: 15px; align-items: center; }
        .input-wrap { flex: 1; background: rgba(255, 255, 255, 0.12); border-radius: 12px; display: flex; align-items: center; padding: 12px 15px; }
        .input-wrap input { background: transparent; border: none; color: white; font-size: 17px; width: 100%; outline: none; margin-left: 10px; }

        /* PLAYER CARD */
        #player-container {
            margin: 20px; background: var(--ios-card); border-radius: var(--radius-m);
            padding: 15px; border: var(--glass-border); display: none;
            animation: fadeInUp 0.5s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; border-radius: 12px; margin-top: 10px; background: #000; }
        
        /* CUSTOM PLAYER UI */
        .custom-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }
        .play-pause-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.4);
            flex-shrink: 0;
        }
        .progress-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--ios-subtext);
            font-variant-numeric: tabular-nums;
        }
        .seek-bar {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            outline: none;
        }
        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* CONTENT LISTS */
        .section-title { padding: 20px 20px 10px; font-size: 22px; font-weight: 700; }
        .horizontal-scroll { display: flex; overflow-x: auto; padding: 0 20px 25px; gap: 18px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        
        .card-item { width: 140px; min-width: 140px; cursor: pointer; }
        .card-icon { width: 140px; height: 140px; border-radius: 22px; object-fit: cover; margin-bottom: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .card-name { font-size: 14px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .app-list-container { background: var(--ios-card); margin: 0 20px; border-radius: var(--radius-m); padding: 0 16px; border: var(--glass-border); }
        .app-item { display: flex; padding: 14px 0; border-bottom: 0.5px solid var(--ios-separator); align-items: center; cursor: pointer; }
        .app-item:last-child { border-bottom: none; }
        .app-icon { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; }
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .app-meta { font-size: 12px; color: var(--ios-subtext); margin-top: 2px; }
        .play-btn { color: var(--ios-blue); font-weight: 800; font-size: 12px; background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 20px; }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 240px; height: 74px; background: var(--nav-bg); backdrop-filter: blur(40px);
            border-radius: 37px; display: flex; justify-content: space-evenly; align-items: center;
            z-index: 4000; border: 1px solid rgba(255,255,255,0.15);
        }
        .nav-item { color: rgba(255,255,255,0.4); text-align: center; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--ios-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo">PodStream</div>
</header>

<div class="header-spacer"></div>

<div class="search-bar" id="search-overlay">
    <div class="search-box">
        <div class="input-wrap">
            <i class="fas fa-search" style="color:var(--ios-subtext)"></i>
            <input type="text" id="search-input" placeholder="Podcasts suchen..." onkeyup="if(event.key==='Enter') searchPodcasts()">
        </div>
        <span onclick="toggleSearch(false)" style="color:var(--ios-blue); cursor:pointer;">Abbrechen</span>
    </div>
    <div id="search-results" style="padding: 20px; overflow-y: auto; height: 80vh;"></div>
</div>

<div id="player-container">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
        <img id="player-art" src="" style="width: 50px; height: 50px; border-radius: 8px;">
        <div style="overflow: hidden; flex: 1;">
            <div id="player-title" style="font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Wähle eine Episode</div>
            <div id="player-sub" style="font-size: 12px; color: var(--ios-subtext);">Wird abgespielt...</div>
        </div>
        <i class="fas fa-times" onclick="closePlayer()" style="opacity:0.5; padding: 10px; cursor: pointer;"></i>
    </div>
    <div id="media-wrapper"></div>
</div>

<div id="content-main">
    <div class="section-title">Empfohlen</div>
    <div class="horizontal-scroll" id="trending-scroll"></div>

    <div class="section-title" id="episode-header" style="display:none;">Episoden</div>
    <div id="episode-list" class="app-list-container" style="display:none;"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="location.reload()">
        <i class="fas fa-house"></i>
        <span>Entdecken</span>
    </div>
    <div class="nav-item" id="nav-search" onclick="toggleSearch(true)">
        <i class="fas fa-magnifying-glass"></i>
        <span>Suche</span>
    </div>
</nav>

<script>
    const PROXIES = [
        "https://api.allorigins.win/get?url=",
        "https://api.codetabs.com/v1/proxy?quest="
    ];

    function toggleSearch(show) {
        document.getElementById('search-overlay').classList.toggle('active', show);
        if(show) document.getElementById('search-input').focus();
    }

    async function searchPodcasts() {
        const query = document.getElementById('search-input').value;
        const resultsBox = document.getElementById('search-results');
        if(!query) return;
        resultsBox.innerHTML = '<div class="loader"></div>';

        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=podcast&limit=20`);
            const data = await resp.json();
            resultsBox.innerHTML = "";
            
            data.results.forEach(p => {
                resultsBox.innerHTML += `
                    <div class="app-item" onclick="loadEpisodes('${p.feedUrl}', '${p.artworkUrl600}')">
                        <img src="${p.artworkUrl100}" class="app-icon" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="app-info">
                            <span class="app-name">${p.collectionName}</span>
                            <span class="app-meta">${p.artistName}</span>
                        </div>
                        <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                    </div>`;
            });
        } catch (e) { resultsBox.innerHTML = "Suche fehlgeschlagen."; }
    }

    async function loadEpisodes(feedUrl, art) {
        toggleSearch(false);
        const list = document.getElementById('episode-list');
        const header = document.getElementById('episode-header');
        
        header.style.display = "block";
        list.style.display = "block";
        list.innerHTML = '<div class="loader"></div><p style="text-align:center; opacity:0.5; font-size:12px;">Lade Podcast-Daten...</p>';
        list.scrollIntoView({behavior: "smooth"});

        let xmlContent = null;

        for (let proxyBase of PROXIES) {
            try {
                const response = await fetch(proxyBase + encodeURIComponent(feedUrl));
                const data = await response.json();
                xmlContent = data.contents || data; 
                if (xmlContent) break; 
            } catch (err) {
                console.warn("Proxy fehlgeschlagen, versuche nächsten...");
            }
        }

        if (!xmlContent) {
            list.innerHTML = "<p style='padding:20px; color:#ff453a;'>Dieser Podcast blockiert den Web-Zugriff. Versuche einen anderen.</p>";
            return;
        }

        try {
            const xml = new DOMParser().parseFromString(xmlContent, "text/xml");
            const items = xml.querySelectorAll("item");
            list.innerHTML = "";

            if(items.length === 0) throw new Error("Keine Episoden im XML");

            items.forEach((item, i) => {
                if(i > 40) return; 
                
                const title = item.querySelector("title")?.textContent || "Episode " + (i+1);
                const enc = item.querySelector("enclosure");
                if(!enc) return;
                
                const url = enc.getAttribute("url");
                const type = enc.getAttribute("type") || "";
                const isVideo = type.includes("video") || url.includes(".mp4");

                list.innerHTML += `
                    <div class="app-item" onclick="play('${url}', '${title.replace(/'/g, "\\'")}', ${isVideo}, '${art}')">
                        <div class="app-info">
                            <span class="app-name">${title}</span>
                            <span class="app-meta">${isVideo ? 'VIDEO' : 'AUDIO'} • ${new Date(item.querySelector("pubDate")?.textContent).toLocaleDateString()}</span>
                        </div>
                        <div class="play-btn">PLAY</div>
                    </div>`;
            });
        } catch (e) { 
            list.innerHTML = "<p style='padding:20px;'>Fehler beim Lesen des Podcast-Feeds.</p>"; 
        }
    }

    // Custom Player Logik
    function play(url, title, isVideo, art) {
        const container = document.getElementById('player-container');
        const wrapper = document.getElementById('media-wrapper');
        document.getElementById('player-title').innerText = title;
        document.getElementById('player-art').src = art;
        
        container.style.display = "block";
        
        // Entferne das controls-Attribut und füge eigenes UI hinzu
        wrapper.innerHTML = `
            ${isVideo ? `<video id="media-element" playsinline><source src="${url}"></video>` : `<audio id="media-element"><source src="${url}"></audio>`}
            <div class="custom-controls">
                <button class="play-pause-btn" id="play-pause-btn">
                    <i class="fas fa-pause"></i>
                </button>
                <div class="progress-wrapper">
                    <span id="current-time">0:00</span>
                    <input type="range" id="seek-bar" class="seek-bar" value="0" step="1">
                    <span id="duration-time">0:00</span>
                </div>
            </div>
        `;
        
        window.scrollTo({top: 0, behavior: 'smooth'});
        initCustomPlayer();
    }

    function initCustomPlayer() {
        const media = document.getElementById('media-element');
        const playBtn = document.getElementById('play-pause-btn');
        const playIcon = playBtn.querySelector('i');
        const seekBar = document.getElementById('seek-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');

        // Hilfsfunktion zur Zeitformatierung
        const formatTime = (seconds) => {
            if (isNaN(seconds) || seconds < 0) return "0:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            }
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        // Autoplay starten
        media.play().catch(() => {
            playIcon.className = 'fas fa-play'; // Falls Browser Autoplay blockiert
        });

        // Play / Pause Toggle
        playBtn.addEventListener('click', () => {
            if (media.paused) {
                media.play();
                playIcon.className = 'fas fa-pause';
            } else {
                media.pause();
                playIcon.className = 'fas fa-play';
            }
        });

        // Metadaten geladen -> Dauer setzen
        media.addEventListener('loadedmetadata', () => {
            seekBar.max = media.duration;
            durationTimeEl.innerText = formatTime(media.duration);
        });

        // Zeit aktualisieren während der Wiedergabe
        media.addEventListener('timeupdate', () => {
            seekBar.value = media.currentTime;
            currentTimeEl.innerText = formatTime(media.currentTime);
        });

        // Manuelles Spulen über den Slider
        seekBar.addEventListener('input', () => {
            media.currentTime = seekBar.value;
            currentTimeEl.innerText = formatTime(media.currentTime);
        });

        // Wenn die Datei zu Ende ist
        media.addEventListener('ended', () => {
            playIcon.className = 'fas fa-play';
            seekBar.value = 0;
            currentTimeEl.innerText = "0:00";
        });
    }

    function closePlayer() {
        const media = document.getElementById('media-element');
        if (media) media.pause(); // Ton stoppen!
        document.getElementById('player-container').style.display = 'none';
    }

    async function init() {
        const scroll = document.getElementById('trending-scroll');
        const terms = ['Zeit Verbrechen', 'Handelsblatt', 'Hobbylos', 'Baywatch Berlin'];
        
        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${terms[Math.floor(Math.random()*terms.length)]}&entity=podcast&limit=8&country=de`);
            const data = await resp.json();
            
            data.results.forEach(p => {
                scroll.innerHTML += `
                    <div class="card-item" onclick="loadEpisodes('${p.feedUrl}', '${p.artworkUrl600}')">
                        <img src="${p.artworkUrl600}" class="card-icon" onerror="this.src='https://via.placeholder.com/150'">
                        <span class="card-name">${p.collectionName}</span>
                    </div>`;
            });
        } catch (e) { scroll.innerHTML = "Fehler beim Laden."; }
    }

    window.addEventListener('scroll', () => {
        document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 20);
    });

    init();
</script>

</body>
</html>
