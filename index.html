<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify: #1DB954;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .app-logo-big { font-size: 42px; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }
        .start-btn {
            background: #fff; color: #000; padding: 18px 50px; border-radius: 40px;
            font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .start-btn:active { transform: scale(0.9); }

        /* --- BACKGROUND --- */
        #dynamic-bg {
            position: absolute; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.5); z-index: 0; transition: 1.2s ease;
        }

        /* --- MAIN UI --- */
        .main-ui {
            position: relative; z-index: 10; height: 100%; width: 100%;
            display: flex; flex-direction: column;
        }

        header {
            padding: 60px 25px 20px;
            display: flex; justify-content: center; align-items: center;
        }
        .app-title { font-size: 20px; font-weight: 800; opacity: 0.9; }
        .history-btn { position: absolute; right: 25px; font-size: 22px; cursor: pointer; }

        /* --- CONTENT (TIKTOK STYLE) --- */
        .content-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .main-card {
            width: 90vw; max-width: 400px; aspect-ratio: 1/1;
            position: relative; cursor: pointer;
        }
        #current-cover {
            width: 100%; height: 100%; border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .main-card:active #current-cover { transform: scale(0.96); }

        /* --- FOOTER (Spotify Style) --- */
        .player-footer {
            padding: 30px 25px 60px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .track-meta h1 { font-size: 24px; margin: 0; font-weight: 800; }
        .track-meta p { font-size: 17px; margin: 5px 0 0; opacity: 0.7; }

        .spotify-trigger {
            width: 58px; height: 58px; background: var(--spotify);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #000; box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
            text-decoration: none; transition: 0.3s;
        }
        .spotify-trigger:active { transform: scale(0.8); }

        /* --- HISTORY LIST --- */
        #history-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; display: none; padding: 70px 25px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }
        .history-item {
            display: flex; align-items: center; padding: 15px;
            background: var(--glass); border-radius: 16px; margin-bottom: 12px;
        }
        .history-item img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; }
        .history-item .info { flex: 1; overflow: hidden; }
        .history-item h4 { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item p { margin: 3px 0 0; font-size: 13px; opacity: 0.6; }
        
        .close-btn { position: absolute; top: 30px; left: 25px; font-size: 24px; }

        /* Loader */
        .loading-ring {
            position: absolute; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1); border-top-color: #fff;
            border-radius: 50%; animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="app-logo-big">MusicBack</div>
        <div class="start-btn" onclick="initApp()">START</div>
    </div>

    <div id="dynamic-bg"></div>

    <div class="main-ui">
        <header>
            <div class="app-title">MusicBack</div>
            <i class="fas fa-clock-rotate-left history-btn" onclick="toggleHistory(true)"></i>
        </header>

        <div class="content-area">
            <div id="loader" class="loading-ring" style="display:none;"></div>
            <div class="main-card" onclick="nextTrack()">
                <img id="current-cover" src="" alt="">
            </div>
        </div>

        <div class="player-footer">
            <div class="track-meta">
                <h1 id="m-title">Laden...</h1>
                <p id="m-artist">...</p>
            </div>
            <a href="#" id="m-spotify" target="_blank" class="spotify-trigger">
                <i class="fab fa-spotify"></i>
            </a>
        </div>
    </div>

    <div id="history-panel">
        <i class="fas fa-xmark close-btn" onclick="toggleHistory(false)"></i>
        <h2 style="margin-bottom: 30px;">Zuletzt gehört</h2>
        <div id="history-list"></div>
    </div>

    <audio id="audio-engine" preload="auto"></audio>

<script>
    const audio = document.getElementById('audio-engine');
    const history = [];
    let trackQueue = [];

    async function initApp() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
        fetchMusic();
    }

    async function fetchMusic() {
        const genres = ['Techno', 'Hardstyle', 'Phonk', 'Rock', 'Metal', 'Electronic'];
        const randomGenre = genres[Math.floor(Math.random() * genres.length)];
        
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${randomGenre}&entity=song&limit=25`);
            const data = await r.json();
            trackQueue = data.results.filter(t => t.previewUrl);
            nextTrack();
        } catch (e) { console.log("Fehler beim Laden"); }
    }

    function nextTrack() {
        if (trackQueue.length === 0) { fetchMusic(); return; }
        
        const track = trackQueue.pop();
        const highResCover = track.artworkUrl100.replace('100x100bb', '600x600bb');
        
        // UI Updates
        document.getElementById('m-title').innerText = track.trackName;
        document.getElementById('m-artist').innerText = track.artistName;
        document.getElementById('current-cover').src = highResCover;
        document.getElementById('dynamic-bg').style.backgroundImage = `url(${highResCover})`;
        
        // Spotify Deep Link (Search)
        const query = encodeURIComponent(`${track.artistName} ${track.trackName}`);
        document.getElementById('m-spotify').href = `spotify:search:${query}`;

        // Audio
        audio.src = track.previewUrl;
        audio.play().catch(e => console.log("Play blocked"));

        // Add to history
        saveToHistory(track);
    }

    function saveToHistory(t) {
        history.unshift(t);
        if(history.length > 30) history.pop();
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        container.innerHTML = history.map(t => `
            <div class="history-item" onclick="playPreview('${t.previewUrl}', '${t.trackName}', '${t.artistName}', '${t.artworkUrl100}')">
                <img src="${t.artworkUrl100}">
                <div class="info">
                    <h4>${t.trackName}</h4>
                    <p>${t.artistName}</p>
                </div>
                <a href="spotify:search:${encodeURIComponent(t.artistName + ' ' + t.trackName)}" style="color:var(--spotify); font-size:20px;">
                    <i class="fab fa-spotify"></i>
                </a>
            </div>
        `).join('');
    }

    function playPreview(url, title, artist, art) {
        audio.src = url;
        audio.play();
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-artist').innerText = artist;
        document.getElementById('current-cover').src = art.replace('100x100bb', '600x600bb');
        document.getElementById('dynamic-bg').style.backgroundImage = `url(${art.replace('100x100bb', '600x600bb')})`;
        toggleHistory(false);
    }

    function toggleHistory(show) {
        document.getElementById('history-panel').style.display = show ? 'block' : 'none';
    }

    audio.onended = nextTrack;
</script>
</body>
</html>
