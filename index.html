<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            /* Schwarzer Layer entfernt, Hintergrund ist jetzt transparent für das Blur-Bild */
            background-color: transparent;
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* Das Blur-Bild füllt jetzt den kompletten Bildschirm */
        #bg-blur {
            position: fixed; inset: 0; z-index: -2;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.5);
            transition: background-image 0.8s ease-in-out;
            background-color: #000; /* Fallback */
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--spotify-green); color: black; border: none;
            padding: 18px 60px; border-radius: 40px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        /* --- HEADER --- */
        header {
            position: absolute; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 20px) 25px 20px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-text { font-size: 20px; font-weight: 700; flex: 1; text-align: center; margin-left: 60px; }
        .header-actions { display: flex; gap: 20px; }
        .header-icon { font-size: 24px; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* --- MAIN CONTENT --- */
        #feed-container {
            height: 100dvh; width: 100vw; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .cover-container {
            position: relative; width: 80vw; max-width: 350px; aspect-ratio: 1/1;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10; margin-bottom: 60px;
        }
        .cover-art {
            width: 100%; height: 100%; border-radius: 20px; object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- INFO SECTION (Links ausgerichtet) --- */
        .info-section {
            width: 85vw; max-width: 400px;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .artist-tag { 
            font-size: 24px; font-weight: 800; margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .bottom-card {
            background: rgba(40, 40, 40, 0.8); backdrop-filter: blur(20px);
            width: 100%; border-radius: 25px; padding: 20px;
            display: flex; align-items: center; gap: 15px; position: relative;
        }
        .song-details { flex: 1; overflow: hidden; }
        .song-details h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .song-details p { margin: 5px 0 0; font-size: 14px; opacity: 0.6; }

        .action-icon { font-size: 26px; cursor: pointer; color: white; }
        .action-icon.liked { color: #ff3b30; }

        .spotify-circle {
            width: 50px; height: 50px; background: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: black; cursor: pointer;
        }

        .progress-line {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background: rgba(255,255,255,0.3); width: 100%; border-radius: 0 0 25px 25px;
        }
        #progress-inner { height: 100%; background: white; width: 0%; border-radius: 0 0 0 25px; }

        /* --- SIDE PANELS --- */
        .side-panel {
            position: fixed; inset: 0; background: #121212; z-index: 5000;
            padding: calc(env(safe-area-inset-top) + 80px) 20px 20px;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); }
        .panel-header {
            position: absolute; top: calc(env(safe-area-inset-top) + 20px); left: 20px; right: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .list-item {
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            background: #222; padding: 12px; border-radius: 15px;
        }
        .list-item img { width: 50px; height: 50px; border-radius: 8px; }
        .list-item-info { flex: 1; overflow: hidden; }
        .list-item-info b { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-actions { display: flex; gap: 15px; font-size: 18px; }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; padding: 25px;
            backdrop-filter: blur(10px);
        }
        .modal-box { background: #222; border-radius: 30px; padding: 30px; text-align: center; width: 100%; max-width: 320px; }
    </style>
</head>
<body>

    <div id="bg-blur"></div>

    <div id="start-screen">
        <h1 style="margin-bottom: 30px;">MusicBack</h1>
        <button class="start-btn" onclick="startApp()">Start</button>
    </div>

    <header>
        <div class="logo-text">MusicBack</div>
        <div class="header-actions">
            <i class="far fa-heart header-icon" onclick="toggleLikes(true)"></i>
            <i class="fas fa-history header-icon" onclick="toggleHistory(true)"></i>
        </div>
    </header>

    <div id="feed-container">
        <div class="cover-container" id="cover-container">
            <img id="main-cover" class="cover-art" src="" alt="">
        </div>

        <div class="info-section" id="info-section">
            <div class="artist-tag" id="display-artist">Artist</div>
            <div class="bottom-card">
                <div class="song-details">
                    <h3 id="display-title">Song Title</h3>
                    <p id="display-album">Track Info</p>
                </div>
                <i class="far fa-heart action-icon" id="like-btn" onclick="toggleLike(event)"></i>
                <div class="spotify-circle" onclick="triggerSpotify(event)">
                    <i class="fab fa-spotify"></i>
                </div>
                <div class="progress-line"><div id="progress-inner"></div></div>
            </div>
        </div>
    </div>

    <div id="likes-panel" class="side-panel">
        <div class="panel-header">
            <i class="fas fa-chevron-left" style="font-size:24px" onclick="toggleLikes(false)"></i>
            <h2 style="margin:0">Favoriten</h2>
            <div style="width:24px"></div>
        </div>
        <div id="likes-list"></div>
    </div>

    <div id="history-panel" class="side-panel">
        <div class="panel-header">
            <i class="fas fa-chevron-left" style="font-size:24px" onclick="toggleHistory(false)"></i>
            <h2 style="margin:0">Verlauf</h2>
            <div style="width:24px"></div>
        </div>
        <div id="history-list"></div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2>Auf Spotify öffnen?</h2>
            <p style="color:#aaa; margin-bottom:25px;">MusicBack wird pausiert.</p>
            <button class="start-btn" style="width:100%; margin-bottom:15px;" onclick="confirmSpotify()">Öffnen</button>
            <button style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;" onclick="closeModal()">Abbrechen</button>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

<script>
    const player = document.getElementById('player');
    const coverContainer = document.getElementById('cover-container');
    const likeBtn = document.getElementById('like-btn');
    
    let tracks = [];
    let playedHistory = [];
    let likedTracks = new Map();
    let currentIndex = -1;
    let startY = 0;
    let isDragging = false;

    // Likes laden
    const saved = localStorage.getItem('musicback_likes');
    if(saved) JSON.parse(saved).forEach(t => likedTracks.set(t.trackId, t));

    async function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        const res = await fetch('https://itunes.apple.com/search?term=techno&entity=song&limit=100');
        const data = await res.json();
        tracks = data.results.filter(t => t.previewUrl);
        playNext();
    }

    function loadTrack(track) {
        const art = track.artworkUrl100.replace('100x100bb', '600x600bb');
        document.getElementById('main-cover').src = art;
        document.getElementById('bg-blur').style.backgroundImage = `url('${art}')`;
        document.getElementById('display-artist').innerText = track.artistName;
        document.getElementById('display-title').innerText = track.trackName;
        document.getElementById('display-album').innerText = track.trackNumber || track.collectionName;
        
        player.src = track.previewUrl;
        player.play();

        const isLiked = likedTracks.has(track.trackId);
        likeBtn.className = isLiked ? 'fas fa-heart action-icon liked' : 'far fa-heart action-icon';
    }

    function playNext() {
        if(currentIndex < playedHistory.length - 1) {
            currentIndex++;
            loadTrack(playedHistory[currentIndex]);
        } else {
            const next = tracks.splice(Math.floor(Math.random()*tracks.length), 1)[0];
            playedHistory.push(next);
            currentIndex++;
            loadTrack(next);
        }
    }

    function playPrev() {
        if(currentIndex > 0) { currentIndex--; loadTrack(playedHistory[currentIndex]); }
    }

    function toggleLike(e) {
        if(e) e.stopPropagation();
        const t = playedHistory[currentIndex];
        if(likedTracks.has(t.trackId)) likedTracks.delete(t.trackId);
        else likedTracks.set(t.trackId, t);
        
        localStorage.setItem('musicback_likes', JSON.stringify([...likedTracks.values()]));
        loadTrack(t);
    }

    async function download(url, name) {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${name}.m4a`;
        link.click();
    }

    function renderList(targetId, list) {
        const container = document.getElementById(targetId);
        container.innerHTML = list.map(t => `
            <div class="list-item">
                <img src="${t.artworkUrl100}" onclick='playTrackFromList(${JSON.stringify(t)})'>
                <div class="list-item-info" onclick='playTrackFromList(${JSON.stringify(t)})'>
                    <b>${t.trackName}</b>
                    <small style="color:#aaa">${t.artistName}</small>
                </div>
                <div class="list-actions">
                    <i class="fas fa-download" onclick="download('${t.previewUrl}', '${t.trackName}')"></i>
                    ${targetId === 'likes-list' ? `<i class="fas fa-trash" style="color:#ff3b30" onclick="removeLike(${t.trackId})"></i>` : ''}
                </div>
            </div>
        `).join('') || '<p style="text-align:center; opacity:0.5">Nichts gefunden.</p>';
    }

    function playTrackFromList(t) {
        playedHistory.push(t);
        currentIndex = playedHistory.length - 1;
        loadTrack(t);
        toggleHistory(false); toggleLikes(false);
    }

    function removeLike(id) { likedTracks.delete(id); localStorage.setItem('musicback_likes', JSON.stringify([...likedTracks.values()])); renderList('likes-list', [...likedTracks.values()].reverse()); }

    function toggleHistory(s) { document.getElementById('history-panel').classList.toggle('active', s); if(s) renderList('history-list', [...playedHistory].reverse()); }
    function toggleLikes(s) { document.getElementById('likes-panel').classList.toggle('active', s); if(s) renderList('likes-list', [...likedTracks.values()].reverse()); }

    // Swipe Logic
    coverContainer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; isDragging = true; coverContainer.style.transition = 'none'; });
    coverContainer.addEventListener('touchmove', e => { if(!isDragging) return; const d = e.touches[0].clientY - startY; coverContainer.style.transform = `translateY(${d*0.5}px) scale(0.95)`; });
    coverContainer.addEventListener('touchend', e => {
        isDragging = false;
        coverContainer.style.transition = '0.4s';
        coverContainer.style.transform = 'translateY(0) scale(1)';
        const d = e.changedTouches[0].clientY - startY;
        if(d < -100) playNext(); else if(d > 100) playPrev();
    });

    function triggerSpotify(e) { e.stopPropagation(); player.pause(); document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; player.play(); }
    function confirmSpotify() { const t = playedHistory[currentIndex]; window.open(`spotify:search:${encodeURIComponent(t.artistName + ' ' + t.trackName)}`, '_blank'); closeModal(); }

    player.ontimeupdate = () => { document.getElementById('progress-inner').style.width = (player.currentTime / player.duration) * 100 + '%'; };
    player.onended = playNext;
</script>
</body>
</html>
