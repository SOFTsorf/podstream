<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PodStream">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PodStream - iTunes Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-blue: #0A84FF;
            --ios-text: #FFFFFF;
            --ios-subtext: #8E8E93;
            --ios-separator: #38383A;
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(20, 20, 20, 0.5);
            --radius-l: 32px;
            --radius-m: 18px;
            --header-height: 100px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            margin: 0; background: var(--ios-bg); color: var(--ios-text); 
            padding-bottom: 120px; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            z-index: 1000; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        header.scrolled { height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: var(--glass-border); }
        .logo { font-size: 34px; font-weight: 800; letter-spacing: -1px; transition: 0.4s; }
        header.scrolled .logo { font-size: 22px; }

        .header-spacer { height: var(--header-height); }

        /* SEARCH OVERLAY */
        .search-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px);
            z-index: 5000; opacity: 0; pointer-events: none; transition: 0.3s; padding-top: 60px;
        }
        .search-bar.active { opacity: 1; pointer-events: auto; }
        .search-box { display: flex; padding: 0 20px; gap: 15px; }
        .input-wrap { flex: 1; background: rgba(255, 255, 255, 0.12); border-radius: 12px; display: flex; align-items: center; padding: 12px 15px; }
        .input-wrap input { background: transparent; border: none; color: white; font-size: 17px; width: 100%; outline: none; margin-left: 10px; }

        /* PLAYER CARD (Sticky) */
        #player-container {
            margin: 20px; background: var(--ios-card); border-radius: var(--radius-m);
            padding: 15px; border: var(--glass-border); display: none;
            animation: fadeInUp 0.5s ease;
        }
        video, audio { width: 100%; border-radius: 12px; margin-top: 10px; background: #000; }

        /* LISTS */
        .section-title { padding: 20px; font-size: 22px; font-weight: 700; color: var(--ios-text); }
        .horizontal-scroll { display: flex; overflow-x: auto; padding: 0 20px 25px; gap: 18px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        
        .card-item { width: 140px; min-width: 140px; cursor: pointer; text-align: center; }
        .card-icon { width: 140px; height: 140px; border-radius: 22px; object-fit: cover; margin-bottom: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-name { font-size: 14px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .app-list-container { background: var(--ios-card); margin: 0 20px; border-radius: var(--radius-m); padding: 0 16px; border: var(--glass-border); }
        .app-item { display: flex; padding: 12px 0; border-bottom: 0.5px solid var(--ios-separator); align-items: center; cursor: pointer; }
        .app-icon { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; }
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .app-meta { font-size: 12px; color: var(--ios-subtext); }
        .play-btn { color: var(--ios-blue); font-weight: 800; font-size: 13px; background: #333; padding: 6px 15px; border-radius: 20px; }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 220px; height: 70px; background: var(--nav-bg); backdrop-filter: blur(30px);
            border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center;
            z-index: 4000; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { color: rgba(255,255,255,0.5); text-align: center; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo">PodStream</div>
</header>

<div class="header-spacer"></div>

<div class="search-bar" id="search-overlay">
    <div class="search-box">
        <div class="input-wrap">
            <i class="fas fa-search" style="color:var(--ios-subtext)"></i>
            <input type="text" id="search-input" placeholder="Podcasts suchen..." onkeyup="if(event.key==='Enter') searchPodcasts()">
        </div>
        <span onclick="toggleSearch(false)" style="color:var(--ios-blue); cursor:pointer;">Abbrechen</span>
    </div>
    <div id="search-results" style="padding: 20px; overflow-y: auto; height: 80vh;"></div>
</div>

<div id="player-container">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
        <img id="player-art" src="" style="width: 50px; height: 50px; border-radius: 8px;">
        <div style="overflow: hidden;">
            <div id="player-title" style="font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Titel</div>
            <div id="player-sub" style="font-size: 12px; color: var(--ios-subtext);">Wird abgespielt...</div>
        </div>
    </div>
    <div id="media-wrapper"></div>
</div>

<div id="content-main">
    <div class="section-title">Empfohlen</div>
    <div class="horizontal-scroll" id="trending-scroll">
        </div>

    <div class="section-title" id="episode-header" style="display:none;">Episoden</div>
    <div id="episode-list" class="app-list-container" style="display:none;"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="location.reload()">
        <i class="fas fa-house"></i>
        <span>Entdecken</span>
    </div>
    <div class="nav-item" onclick="toggleSearch(true)">
        <i class="fas fa-magnifying-glass"></i>
        <span>Suche</span>
    </div>
</nav>

<script>
    const PROXY = "https://api.allorigins.win/get?url="; // Schnellerer Proxy-Provider

    function toggleSearch(show) {
        document.getElementById('search-overlay').classList.toggle('active', show);
        if(show) document.getElementById('search-input').focus();
    }

    async function searchPodcasts() {
        const query = document.getElementById('search-input').value;
        const resultsBox = document.getElementById('search-results');
        resultsBox.innerHTML = "<p>Suche läuft...</p>";

        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=podcast&limit=15`);
            const data = await resp.json();
            resultsBox.innerHTML = "";
            
            data.results.forEach(p => {
                resultsBox.innerHTML += `
                    <div class="app-item" onclick="loadEpisodes('${p.feedUrl}', '${p.artworkUrl100}')">
                        <img src="${p.artworkUrl100}" class="app-icon">
                        <div class="app-info">
                            <span class="app-name">${p.collectionName}</span>
                            <span class="app-meta">${p.artistName}</span>
                        </div>
                        <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                    </div>`;
            });
        } catch (e) { resultsBox.innerHTML = "Fehler bei der Suche."; }
    }

    async function loadEpisodes(feedUrl, art) {
        toggleSearch(false);
        const list = document.getElementById('episode-list');
        const header = document.getElementById('episode-header');
        
        header.style.display = "block";
        list.style.display = "block";
        list.innerHTML = "<p style='padding:20px;'>Episoden werden geladen... (CORS-Check)</p>";
        list.scrollIntoView({behavior: "smooth"});

        try {
            const response = await fetch(PROXY + encodeURIComponent(feedUrl));
            const data = await response.json();
            const xml = new DOMParser().parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");

            list.innerHTML = "";
            items.forEach((item, i) => {
                if(i > 20) return; // Limit für Speed
                const title = item.querySelector("title").textContent;
                const enc = item.querySelector("enclosure");
                if(!enc) return;
                
                const url = enc.getAttribute("url");
                const type = enc.getAttribute("type") || "";
                const isVideo = type.includes("video") || url.includes(".mp4") || url.includes(".mov");

                list.innerHTML += `
                    <div class="app-item" onclick="play('${url}', '${title.replace(/'/g, "\\'")}', ${isVideo}, '${art}')">
                        <div class="app-info">
                            <span class="app-name">${title}</span>
                            <span class="app-meta">${isVideo ? 'VIDEO PODCAST' : 'AUDIO EPISODE'}</span>
                        </div>
                        <div class="play-btn">PLAY</div>
                    </div>`;
            });
        } catch (e) { list.innerHTML = "Fehler beim Laden des Feeds."; }
    }

    function play(url, title, isVideo, art) {
        const container = document.getElementById('player-container');
        const wrapper = document.getElementById('media-wrapper');
        document.getElementById('player-title').innerText = title;
        document.getElementById('player-art').src = art;
        
        container.style.display = "block";
        wrapper.innerHTML = isVideo ? 
            `<video controls autoplay playsinline><source src="${url}"></video>` : 
            `<audio controls autoplay><source src="${url}"></audio>`;
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Initiale Empfehlungen
    async function init() {
        const scroll = document.getElementById('trending-scroll');
        const terms = ['Tagesschau', 'Huberman', 'Wissen', 'Comedy'];
        const randomTerm = terms[Math.floor(Math.random() * terms.length)];
        
        const resp = await fetch(`https://itunes.apple.com/search?term=${randomTerm}&entity=podcast&limit=6`);
        const data = await resp.json();
        
        data.results.forEach(p => {
            scroll.innerHTML += `
                <div class="card-item" onclick="loadEpisodes('${p.feedUrl}', '${p.artworkUrl600}')">
                    <img src="${p.artworkUrl600}" class="card-icon">
                    <span class="card-name">${p.collectionName}</span>
                </div>`;
        });
    }

    window.addEventListener('scroll', () => {
        document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 20);
    });

    init();
</script>

</body>
</html>
