<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-green-hover: #1ed760;
            --bg-dark: #121212;
            --card-bg: rgba(28, 28, 28, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            background-color: #000; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .start-btn {
            background: var(--spotify-green); color: black; border: none;
            padding: 18px 50px; border-radius: 40px; font-size: 20px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* --- BACKGROUND --- */
        #blur-bg {
            position: absolute; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.4); z-index: 0; transition: background-image 0.8s ease;
        }

        /* --- HEADER --- */
        header {
            position: absolute; top: 0; width: 100%; z-index: 100;
            padding: 60px 25px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .history-btn { font-size: 26px; cursor: pointer; opacity: 0.9; }

        /* --- FEED AREA --- */
        #feed-container {
            position: relative; z-index: 10; height: 100dvh; width: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .cover-art {
            width: 85vw; max-width: 380px; aspect-ratio: 1/1;
            border-radius: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            object-fit: cover; transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* --- BOTTOM CARD --- */
        .bottom-card {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92vw; max-width: 420px;
            background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; padding: 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 100; border: 1px solid rgba(255,255,255,0.1);
        }
        .song-info { flex: 1; overflow: hidden; margin-right: 15px; }
        .song-info h3 { margin: 0; font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-info p { margin: 5px 0 0; font-size: 14px; opacity: 0.6; }

        .spotify-btn {
            width: 54px; height: 54px; background: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: black; cursor: pointer; transition: 0.2s;
        }

        /* --- PROGRESS BAR --- */
        .progress-bar-container {
            position: absolute; bottom: 0; left: 20px; right: 20px; height: 3px;
            background: rgba(255,255,255,0.1); border-radius: 2px;
        }
        #progress-fill { height: 100%; background: var(--spotify-green); width: 0%; border-radius: 2px; }

        /* --- MODAL (Bist du sicher?) --- */
        #confirm-modal {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.8); display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: white; color: black; width: 100%; max-width: 320px;
            border-radius: 28px; padding: 30px 25px; text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card h2 { margin: 0 0 15px; font-size: 22px; font-weight: 700; }
        .modal-card p { margin: 0 0 25px; font-size: 15px; line-height: 1.5; color: #555; }
        .modal-btn-confirm {
            background: var(--spotify-green); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 30px;
            font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .modal-btn-cancel {
            background: none; border: none; width: 100%; padding: 10px;
            font-size: 16px; font-weight: bold; color: black; cursor: pointer;
        }

        /* --- HISTORY PANEL --- */
        #history-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; display: none; padding: 80px 20px 20px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .history-list { height: 100%; overflow-y: auto; padding-bottom: 40px; }
        .history-item {
            display: flex; align-items: center; background: rgba(255,255,255,0.05);
            margin-bottom: 12px; padding: 12px; border-radius: 16px;
        }
        .history-item img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; }
        .history-item-content { flex: 1; overflow: hidden; }
        .history-item-content h4 { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item-content p { margin: 4px 0 0; font-size: 13px; opacity: 0.5; }
        .download-btn { font-size: 20px; margin-right: 15px; opacity: 0.7; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="margin-bottom: 30px; font-size: 40px;">MusicBack</h1>
        <button class="start-btn" onclick="initApp()">START</button>
    </div>

    <div id="blur-bg"></div>

    <header>
        <div class="logo-text">MusicBack</div>
        <i class="fas fa-history history-btn" onclick="toggleHistory(true)"></i>
    </header>

    <div id="feed-container">
        <img id="main-cover" class="cover-art" src="" alt="">
    </div>

    <div class="bottom-card">
        <div class="song-info">
            <h3 id="song-title">Warten...</h3>
            <p id="song-artist">Entdecke neue Musik</p>
        </div>
        <div class="spotify-btn" onclick="askSpotify()">
            <i class="fab fa-spotify"></i>
        </div>
        <div class="progress-bar-container">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="confirm-modal">
        <div class="modal-card">
            <h2>Bist du sicher?</h2>
            <p>Nach dem Klicken wirst du zu Spotify weitergeleitet und MusicBack wird pausiert.</p>
            <button class="modal-btn-confirm" onclick="openSpotify()">Öffnen</button>
            <button class="modal-btn-cancel" onclick="closeModal()">Abbrechen</button>
        </div>
    </div>

    <div id="history-panel">
        <i class="fas fa-times" style="position: absolute; top: 30px; left: 25px; font-size: 28px;" onclick="toggleHistory(false)"></i>
        <h2 style="margin-bottom: 25px;">Zuletzt gehört</h2>
        <div class="history-list" id="history-list"></div>
    </div>

    <audio id="audio-player"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const history = [];
    let tracks = [];
    let currentTrack = null;
    let startY = 0;

    async function initApp() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
        
        await fetchMusic();
        nextTrack();
    }

    async function fetchMusic() {
        const genres = ['Techno', 'Hardstyle', 'Phonk', 'Deep House', 'Rave'];
        const genre = genres[Math.floor(Math.random() * genres.length)];
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${genre}&entity=song&limit=40`);
            const data = await r.json();
            tracks = data.results.filter(t => t.previewUrl);
        } catch (e) { console.error("Fehler beim Laden"); }
    }

    function nextTrack() {
        if (tracks.length === 0) return fetchMusic().then(nextTrack);
        
        currentTrack = tracks.splice(Math.floor(Math.random() * tracks.length), 1)[0];
        const art = currentTrack.artworkUrl100.replace('100x100bb', '600x600bb');
        
        // UI Update
        document.getElementById('song-title').innerText = currentTrack.trackName;
        document.getElementById('song-artist').innerText = currentTrack.artistName;
        document.getElementById('main-cover').src = art;
        document.getElementById('blur-bg').style.backgroundImage = `url(${art})`;
        
        // Animation Reset
        const cover = document.getElementById('main-cover');
        cover.style.transform = 'translateY(0) scale(1)';

        audio.src = currentTrack.previewUrl;
        audio.play();

        history.unshift(currentTrack);
        renderHistory();
    }

    // SWIPE LOGIC
    document.addEventListener('touchstart', e => startY = e.touches[0].clientY);
    document.addEventListener('touchend', e => {
        let diff = startY - e.changedTouches[0].clientY;
        if (diff > 80) { // Swipe Up
            document.getElementById('main-cover').style.transform = 'translateY(-100vh) scale(0.8)';
            setTimeout(nextTrack, 300);
        }
    });

    // SPOTIFY FLOW
    function askSpotify() {
        audio.pause();
        document.getElementById('confirm-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('confirm-modal').style.display = 'none';
        audio.play();
    }

    function openSpotify() {
        const query = encodeURIComponent(`${currentTrack.artistName} ${currentTrack.trackName}`);
        window.open(`spotify:search:${query}`, '_blank');
        closeModal();
    }

    // HISTORY & DOWNLOAD
    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = history.map((t, i) => `
            <div class="history-item">
                <img src="${t.artworkUrl100}">
                <div class="history-item-content">
                    <h4>${t.trackName}</h4>
                    <p>${t.artistName}</p>
                </div>
                <i class="fas fa-download download-btn" onclick="downloadPreview('${t.previewUrl}', '${t.trackName}')"></i>
                <i class="fab fa-spotify" style="color:var(--spotify-green); font-size:20px;" onclick="directSpotify('${t.artistName}', '${t.trackName}')"></i>
            </div>
        `).join('');
    }

    function toggleHistory(show) {
        document.getElementById('history-panel').style.display = show ? 'block' : 'none';
    }

    function directSpotify(artist, track) {
        window.open(`spotify:search:${encodeURIComponent(artist + ' ' + track)}`, '_blank');
    }

    async function downloadPreview(url, name) {
        const response = await fetch(url);
        const blob = await response.blob();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${name}.mp3`;
        link.click();
    }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-fill').style.width = p + '%';
    };

    audio.onended = nextTrack;
</script>
</body>
</html>
