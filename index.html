<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DownAPK">
    <meta name="description" content="Lade deine Lieblinsapps herunter!">
    <meta name="keywords" content="DownAPK, APK, Download, Down, APKMirror, APKPure">
    <meta name="author" content="Nexus">
    
    <meta property="og:title" content="DownAPK - Lade kostenlos APKs herunter!">
    <meta property="og:description" content="Lade deine Apps - kostenlos!">
    <meta property="og:image" content="https://lh3.googleusercontent.com/d/1K8g5EPJgvE0-RbGiyJVGWFaCBc9s27gM">
    <meta property="og:type" content="website">

    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DownAPK</title>

    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1K8g5EPJgvE0-RbGiyJVGWFaCBc9s27gM">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1K8g5EPJgvE0-RbGiyJVGWFaCBc9s27gM">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-blue: #0A84FF;
            --ios-text: #FFFFFF;
            --ios-subtext: #8E8E93;
            --ios-separator: #38383A;
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(20, 20, 20, 0.5);
            --nav-item: rgba(255,255,255,0.5);
            --nav-active: #FFF;
            
            --radius-l: 32px;
            --radius-m: 18px;
            --header-height: 100px;
            --header-collapsed: 70px;
        }

        body.light-mode {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-text: #000000;
            --ios-subtext: #8E8E93;
            --ios-separator: #C6C6C8;
            --glass-border: 1px solid rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.65);
            --nav-item: rgba(0,0,0,0.4);
            --nav-active: #000;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            margin: 0; background: var(--ios-bg); color: var(--ios-text); 
            padding-bottom: 120px; overflow-x: hidden; -webkit-font-smoothing: antialiased;
            user-select: none; -webkit-user-select: none;
            transition: background 0.3s, color 0.3s;
        }

        a { text-decoration: none !important; color: inherit !important; -webkit-tap-highlight-color: transparent; }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            20% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        
        @keyframes popBounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-entry {
            opacity: 0; 
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        header { 
            position: fixed; top: 0; left: 0; width: 100%; 
            height: var(--header-height);
            z-index: 1000;
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 20px; box-sizing: border-box;
            transition: height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.4s;
            overflow: visible;
        }

        .header-spacer { height: var(--header-height); width: 100%; }

        .header-blur-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover !important; background-position: center !important;
            filter: blur(25px) brightness(0.4);
            opacity: 0; transition: opacity 0.5s ease;
            z-index: 1;
        }
        body.light-mode .header-blur-bg { filter: blur(25px) brightness(1.2); }

        .logo { 
            font-size: 34px; font-weight: 800; letter-spacing: -1px; 
            position: relative; z-index: 2;
            transform-origin: left center;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: var(--ios-text);
        }

        .header-more-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            margin-left: auto;
            cursor: pointer;
            z-index: 2000;
            color: var(--ios-blue);
            font-size: 16px;
            transition: background 0.2s, color 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        body.light-mode .header-more-btn {
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .sticky-app-bar {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box;
            z-index: 3; opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
            padding-right: 60px;
        }
        
        header.scrolled {
            height: var(--header-collapsed);
            background: rgba(0,0,0,0.3);
            border-bottom: var(--glass-border);
        }
        body.light-mode header.scrolled { background: rgba(255,255,255,0.6); }

        header.scrolled .header-blur-bg { opacity: 1; }
        header.scrolled .logo { opacity: 0; transform: translateY(-20px) scale(0.8); }
        header.scrolled .sticky-app-bar { 
            opacity: 1; transform: translateY(0); pointer-events: auto; 
        }

        .sticky-left { display: flex; align-items: center; overflow: hidden; }
        .sticky-icon { width: 38px; height: 38px; border-radius: 8px; margin-right: 12px; background: #333; }
        .sticky-name { font-weight: 600; font-size: 15px; color: var(--ios-text); }
        .sticky-sub { font-size: 11px; opacity: 0.7; color: var(--ios-text); }
        .sticky-btn {
            background: var(--ios-blue); color: white; border: none;
            padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 12px;
        }

        /* CATEGORY PILLS */
        .category-scroll {
            display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px;
            scrollbar-width: none; margin-bottom: 5px;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        
        .cat-pill {
            background: rgba(255,255,255,0.08); color: var(--ios-subtext);
            padding: 8px 18px; border-radius: 20px; font-size: 14px;
            font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.3s;
        }
        body.light-mode .cat-pill { background: rgba(0,0,0,0.05); }
        .cat-pill.active { background: var(--ios-blue); color: white; }

        /* SKELETON */
        .skeleton-loader { padding: 20px; }
        .skeleton { background: #2C2C2E; border-radius: 8px; animation: pulse 1.5s infinite; }
        body.light-mode .skeleton { background: #E5E5EA; }
        .sk-hero { height: 420px; border-radius: var(--radius-l); margin-bottom: 30px; }
        .sk-item { display: flex; align-items: center; margin-bottom: 20px; }
        .sk-icon { width: 62px; height: 62px; border-radius: 14px; margin-right: 15px; }
        .sk-line { height: 10px; border-radius: 4px; margin-bottom: 8px; background: #333; }

        /* BANNER */
        .featured-banner {
            margin: 15px 20px 30px; background: #111; border-radius: var(--radius-l);
            height: 420px; position: relative; overflow: hidden; display: flex;
            flex-direction: column; justify-content: flex-end; border: var(--glass-border);
        }
        .featured-img-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover !important; background-position: center !important;
            filter: brightness(0.5); z-index: 1;
        }
        .featured-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.95) 100%);
            z-index: 2;
        }
        .featured-info { position: relative; z-index: 3; padding: 30px; text-align: center; }
        .featured-title { font-size: 28px; font-weight: 800; color: white; }
        .get-btn { 
            background: #FFFFFF; color: #000; padding: 12px 50px; border-radius: 25px; 
            font-weight: 700; font-size: 16px; border: none; margin-top: 15px;
        }

        /* CARDS & LIST */
        .section-title { padding: 20px 20px 15px; font-size: 22px; font-weight: 700; color: var(--ios-text); }
        .horizontal-scroll { display: flex; overflow-x: auto; padding: 0 20px 25px; gap: 18px; scrollbar-width: none; }
        .card-item { width: 120px; min-width: 120px; }
        .card-icon { width: 120px; height: 120px; border-radius: 26px; background: #222; margin-bottom: 8px; }
        .card-name { font-size: 14px; font-weight: 500; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .app-list-container { background: var(--ios-card); margin: 0 20px; border-radius: var(--radius-m); padding: 0 16px; border: var(--glass-border); }
        .app-item { display: flex; padding: 15px 0; border-bottom: 0.5px solid var(--ios-separator); align-items: center; }
        .app-icon { width: 62px; height: 62px; border-radius: 14px; margin-right: 15px; background: #222; }
        .app-info { flex-grow: 1; }
        .app-name { font-weight: 600; font-size: 17px; }
        .laden-badge { background: #333; color: var(--ios-blue); padding: 6px 18px; border-radius: 20px; font-weight: 800; font-size: 12px; }
        body.light-mode .laden-badge { background: #F2F2F7; }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 240px; height: 74px; background: var(--nav-bg); 
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border-radius: 37px; display: flex; justify-content: space-evenly; align-items: center;
            z-index: 4000; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { color: var(--nav-item); text-align: center; }
        .nav-item.active { color: var(--ios-blue); }
        .nav-item i { font-size: 24px; display: block; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        /* CONTEXT MENU */
        .context-menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            z-index: 6000; display: none; justify-content: center; align-items: center;
        }
        .context-menu-overlay.active { display: flex; }
        .context-menu-wrapper { width: 280px; animation: scaleIn 0.2s forwards; }
        .context-preview-card { background: var(--ios-card); border-radius: 20px; padding: 20px; margin-bottom: 10px; text-align: center; }
        .ctx-icon { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 10px; }
        .ctx-btn { width: 100%; padding: 12px; border-radius: 12px; background: var(--ios-blue); color: white; border: none; font-weight: 600; }
        .ctx-cancel-btn { width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; border: none; }

        #desktop-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        @media (min-width: 769px) { #desktop-overlay { display: flex; } }
        body.overlay-closed #desktop-overlay { display: none !important; }
    </style>
</head>
<body>

<div id="desktop-overlay">
    <h1 style="font-size: 32px; font-weight: 800;">Mobile Only</h1>
    <p style="color: #8E8E93;">Diese App ist für Smartphones optimiert.</p>
    <button onclick="document.body.classList.add('overlay-closed')" style="background: white; color: black; border: none; padding: 12px 24px; border-radius: 25px; font-weight: 700; cursor: pointer;">Fortfahren</button>
</div>

<div id="context-menu-overlay" class="context-menu-overlay" onclick="closeContextMenu()">
    <div class="context-menu-wrapper" onclick="event.stopPropagation()">
        <div class="context-preview-card">
            <img id="ctx-icon" class="ctx-icon" src="">
            <div id="ctx-name" style="font-weight:700; margin-bottom:5px;">App Name</div>
            <div id="ctx-author" style="color:var(--ios-subtext); font-size:13px; margin-bottom:15px;">Developer</div>
            <button class="ctx-btn" id="ctx-action-btn">Ansehen</button>
        </div>
        <button class="ctx-cancel-btn" onclick="closeContextMenu()">Abbrechen</button>
    </div>
</div>

<header id="main-header">
    <div class="header-blur-bg" id="header-blur"></div>
    <div class="logo">DownAPK</div>
    <div class="sticky-app-bar" id="sticky-bar">
        <div class="sticky-left">
            <img id="sticky-icon" src="" class="sticky-icon">
            <div>
                <div id="sticky-name" class="sticky-name">Laden...</div>
                <div class="sticky-sub">Empfehlung</div>
            </div>
        </div>
        <button class="sticky-btn">LADEN</button>
    </div>
    <div class="header-more-btn" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-sun"></i>
    </div>
</header>

<div class="header-spacer"></div>

<div id="skeleton-loader" class="skeleton-loader">
    <div class="skeleton sk-hero"></div>
    <div class="sk-item"><div class="skeleton sk-icon"></div><div style="flex:1"><div class="skeleton sk-line" style="width:60%"></div><div class="skeleton sk-line" style="width:40%"></div></div></div>
</div>

<div id="content-main" style="display: none;">
    <div class="category-scroll">
        <div class="cat-pill active" onclick="selectCat(this, 'Alle')">Alle</div>
        <div class="cat-pill" onclick="selectCat(this, 'Spiele')">Spiele</div>
        <div class="cat-pill" onclick="selectCat(this, 'Tools')">Tools</div>
        <div class="cat-pill" onclick="selectCat(this, 'Social Media')">Social Media</div>
    </div>

    <div id="featured-hero"></div>

    <div class="section-title">Angesagt</div>
    <div class="horizontal-scroll" id="scroll-trending"></div>

    <div class="section-title">Alle Apps</div>
    <div id="update-feed" class="app-list-container"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item"><i class="fas fa-magnifying-glass"></i><span>Suche</span></div>
</nav>

<script>
    let isLightMode = false;
    let appDatabase = [
        { name: "PhotoSwooper", author: "krille-chan", pkg: "com.github.krille_chan.photoswooper", icon: "https://f-droid.org/repo/com.github.krille_chan.photoswooper/en-US/icon.png", ver: "2.1.0", cat: "Tools" },
        { name: "OmWeather", author: "woheller69", pkg: "org.woheller69.omweather", icon: "https://f-droid.org/repo/org.woheller69.omweather/en-US/icon.png", ver: "1.5.2", cat: "Tools" },
        { name: "NewPipe", author: "Team NewPipe", pkg: "org.schabi.newpipe", icon: "https://f-droid.org/repo/org.schabi.newpipe/en-US/icon.png", ver: "0.27.0", cat: "Media" },
        { name: "Telegram FOSS", author: "Telegram", pkg: "org.telegram.messenger", icon: "https://f-droid.org/repo/org.telegram.messenger/en-US/icon.png", ver: "10.3.1", cat: "Social Media" },
        { name: "AdAway", author: "AdAway", pkg: "org.adaway", icon: "https://f-droid.org/repo/org.adaway/en-US/icon.png", ver: "6.1.1", cat: "Tools" },
        { name: "SuperTuxKart", author: "Tux", pkg: "org.supertuxkart", icon: "https://f-droid.org/repo/org.supertuxkart.stk/en-US/icon.png", ver: "1.4", cat: "Spiele" } 
    ];

    function toggleTheme() {
        isLightMode = !isLightMode;
        document.body.classList.toggle('light-mode', isLightMode);
        document.getElementById('theme-icon').className = isLightMode ? "fas fa-moon" : "fas fa-sun";
    }

    async function loadFDroidApps() {
        try {
            // Versuche API zu laden (Falls vorhanden)
            const response = await fetch('/api/apps').catch(() => null);
            if (response && response.ok) {
                const data = await response.json();
                if (Array.isArray(data)) {
                    const remoteApps = data.map(app => ({
                        name: app.name, author: app.author || "Nexus", pkg: app.packageName,
                        icon: app.icon, ver: app.version || "1.0", cat: "Tools"
                    }));
                    appDatabase = [...appDatabase, ...remoteApps];
                }
            }
        } catch (e) { console.warn("API Offline, nutze lokale DB"); }
        render('Alle');
    }

    function render(filterCat) {
        document.getElementById('skeleton-loader').style.display = 'none';
        document.getElementById('content-main').style.display = 'block';

        let filtered = filterCat === 'Alle' ? appDatabase : appDatabase.filter(a => a.cat === filterCat);
        if (filtered.length === 0) return;

        const feat = filtered[0];
        
        // Header & Hero Update
        document.getElementById('header-blur').style.backgroundImage = `url('${feat.icon}')`;
        document.getElementById('sticky-icon').src = feat.icon;
        document.getElementById('sticky-name').innerText = feat.name;
        
        document.getElementById('featured-hero').innerHTML = `
            <div class="featured-banner" onclick="window.location.href='app.html?id=${feat.pkg}'">
                <div class="featured-img-bg" style="background: url('${feat.icon}') center/cover"></div>
                <div class="featured-overlay"></div>
                <div class="featured-info">
                    <div class="featured-title">${feat.name}</div>
                    <button class="get-btn">Laden</button>
                </div>
            </div>
        `;

        // Listen füllen
        const trending = document.getElementById('scroll-trending');
        const feed = document.getElementById('update-feed');
        trending.innerHTML = ""; feed.innerHTML = "";

        filtered.forEach(app => {
            trending.innerHTML += `
                <div class="card-item" onclick="window.location.href='app.html?id=${app.pkg}'">
                    <img src="${app.icon}" class="card-icon" onerror="this.src='https://f-droid.org/repo/${app.pkg}/en-US/icon.png'">
                    <span class="card-name">${app.name}</span>
                </div>
            `;
            feed.innerHTML += `
                <div class="app-item" onclick="window.location.href='app.html?id=${app.pkg}'" oncontextmenu="openContextMenu(event, '${app.name}', '${app.author}', '${app.icon}')">
                    <img src="${app.icon}" class="app-icon" onerror="this.src='https://f-droid.org/repo/${app.pkg}/en-US/icon.png'">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div style="color:var(--ios-subtext); font-size:13px;">${app.author} • v${app.ver}</div>
                    </div>
                    <div class="laden-badge">LADEN</div>
                </div>
            `;
        });
    }

    function selectCat(el, cat) {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        render(cat);
    }

    function openContextMenu(e, name, author, icon) {
        e.preventDefault();
        const overlay = document.getElementById('context-menu-overlay');
        document.getElementById('ctx-icon').src = icon;
        document.getElementById('ctx-name').innerText = name;
        document.getElementById('ctx-author').innerText = author;
        overlay.classList.add('active');
    }

    function closeContextMenu() {
        document.getElementById('context-menu-overlay').classList.remove('active');
    }

    window.addEventListener('scroll', () => {
        const header = document.getElementById('main-header');
        header.classList.toggle('scrolled', window.scrollY > 40);
    });

    window.onload = loadFDroidApps;
</script>

</body>
</html>
