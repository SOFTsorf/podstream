<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --glass: rgba(255, 255, 255, 0.15);
            --bg-dark: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .start-btn {
            background: transparent; color: white; border: 1px solid white;
            padding: 15px 40px; border-radius: 30px; font-size: 18px;
            font-weight: 300; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .start-btn:hover { background: white; color: black; }

        /* --- DYNAMISCHER BACKGROUND --- */
        #blur-bg {
            position: absolute; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.4); z-index: 0; transition: background-image 0.8s ease;
        }

        /* --- HEADER --- */
        header {
            position: relative; z-index: 10; padding: 50px 20px 0;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-text { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        .history-btn { position: absolute; right: 25px; font-size: 22px; cursor: pointer; opacity: 0.8; }

        /* --- TIKTOK CONTENT AREA --- */
        .feed-container {
            position: relative; z-index: 5; flex: 1; height: 70vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cover-art {
            width: 85vw; max-width: 380px; aspect-ratio: 1/1;
            border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            object-fit: cover; cursor: pointer; transition: transform 0.2s;
        }
        .cover-art:active { transform: scale(0.97); }

        /* --- SPOTIFY STYLE BOTTOM CARD --- */
        .bottom-card {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90vw; max-width: 400px;
            background: rgba(40, 40, 40, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 10; border: 1px solid rgba(255,255,255,0.05);
        }
        .song-details { flex: 1; overflow: hidden; margin-right: 15px; }
        .song-details h3 { margin: 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-details p { margin: 4px 0 0; font-size: 14px; opacity: 0.6; }

        .spotify-logo-btn {
            width: 45px; height: 45px; background: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: black; text-decoration: none; transition: transform 0.2s;
        }
        .spotify-logo-btn:active { transform: scale(0.85); }

        /* --- HISTORY PANEL --- */
        #history-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 2000; display: none; padding: 80px 25px;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }
        .history-list { height: 100%; overflow-y: auto; }
        .history-item {
            display: flex; align-items: center; padding: 12px;
            background: var(--glass); border-radius: 12px; margin-bottom: 10px;
        }
        .history-item img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; }
        .history-close { position: absolute; top: 30px; left: 25px; font-size: 24px; cursor: pointer; }

        /* --- PROGRESS --- */
        .progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.1);
        }
        #progress-bar { height: 100%; background: white; width: 0%; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="margin-bottom: 40px; font-weight: 200;">MusicBack</h1>
        <button class="start-btn" onclick="initApp()">START</button>
    </div>

    <div id="blur-bg"></div>

    <header>
        <div class="logo-text">MusicBack</div>
        <i class="fas fa-history history-btn" onclick="toggleHistory(true)"></i>
    </header>

    <div class="feed-container" onclick="nextTrack()">
        <img id="main-cover" class="cover-art" src="" alt="">
    </div>

    <div class="bottom-card">
        <div class="song-details">
            <h3 id="song-title">Lade...</h3>
            <p id="song-artist">...</p>
        </div>
        <a href="#" id="spotify-link" target="_blank" class="spotify-logo-btn">
            <i class="fab fa-spotify"></i>
        </a>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="history-panel">
        <i class="fas fa-chevron-left history-close" onclick="toggleHistory(false)"></i>
        <h2 style="margin-bottom: 25px;">Verlauf</h2>
        <div class="history-list" id="history-content"></div>
    </div>

    <audio id="audio-player"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const history = [];
    let tracks = [];

    async function initApp() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
        
        // Suche nach coolen Genres (Techno/Phonk passend zu den Bildern)
        const genres = ['Phonk', 'Techno', 'Metal', 'Electronic', 'Cyberpunk'];
        const randomGenre = genres[Math.floor(Math.random() * genres.length)];
        
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${randomGenre}&entity=song&limit=40`);
            const data = await r.json();
            tracks = data.results.filter(t => t.previewUrl);
            nextTrack();
        } catch (e) { alert("Fehler beim Laden der Musik."); }
    }

    function nextTrack() {
        if(tracks.length === 0) return;
        
        const track = tracks.splice(Math.floor(Math.random() * tracks.length), 1)[0];
        const art = track.artworkUrl100.replace('100x100bb', '600x600bb');
        
        // UI
        document.getElementById('song-title').innerText = track.trackName;
        document.getElementById('song-artist').innerText = track.artistName;
        document.getElementById('main-cover').src = art;
        document.getElementById('blur-bg').style.backgroundImage = `url(${art})`;
        
        // Spotify Link (Deep Link Search)
        const query = encodeURIComponent(`${track.artistName} ${track.trackName}`);
        document.getElementById('spotify-link').href = `spotify:search:${query}`;

        // Audio
        audio.src = track.previewUrl;
        audio.play();

        // Verlauf
        history.unshift(track);
        renderHistory();
    }

    function renderHistory() {
        const content = document.getElementById('history-content');
        content.innerHTML = history.map(t => `
            <div class="history-item" onclick="playPreview('${t.previewUrl}', '${t.trackName}', '${t.artistName}', '${t.artworkUrl100}')">
                <img src="${t.artworkUrl100}">
                <div style="flex:1; overflow:hidden;">
                    <h4>${t.trackName}</h4>
                    <p>${t.artistName}</p>
                </div>
                <i class="fab fa-spotify" style="color:var(--spotify-green); font-size:20px;"></i>
            </div>
        `).join('');
    }

    function playPreview(url, title, artist, art) {
        audio.src = url;
        audio.play();
        document.getElementById('song-title').innerText = title;
        document.getElementById('song-artist').innerText = artist;
        document.getElementById('main-cover').src = art.replace('100x100bb', '600x600bb');
        document.getElementById('blur-bg').style.backgroundImage = `url(${art.replace('100x100bb', '600x600bb')})`;
        toggleHistory(false);
    }

    function toggleHistory(show) {
        document.getElementById('history-panel').style.display = show ? 'block' : 'none';
    }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-bar').style.width = p + '%';
    };

    audio.onended = nextTrack;
</script>
</body>
</html>
