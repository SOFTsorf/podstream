<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #1DB954; /* Spotify Green */
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #fff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            padding: 15px 40px; border-radius: 30px; border: 2px solid var(--accent);
            color: var(--accent); font-size: 20px; font-weight: 700; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .start-btn:hover { background: var(--accent); color: #000; }

        /* --- MAIN UI --- */
        .app-container {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        #bg-blur {
            position: absolute; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.4); z-index: 0; transition: 1s ease;
        }

        header {
            position: relative; z-index: 10; width: 100%; padding: 50px 20px 20px;
            display: flex; justify-content: center; align-items: center;
        }
        .app-name { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .history-trigger { position: absolute; right: 25px; font-size: 22px; cursor: pointer; opacity: 0.8; }

        /* --- MUSIC CARD (TikTok Style) --- */
        .feed-container {
            position: relative; z-index: 5; flex: 1; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .cover-wrap {
            width: 80vw; height: 80vw; max-width: 350px; max-height: 350px;
            perspective: 1000px; cursor: pointer;
        }
        #current-art {
            width: 100%; height: 100%; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .cover-wrap:active #current-art { transform: scale(0.95) rotateY(5deg); }

        /* --- DETAILS & SPOTIFY --- */
        .bottom-ui {
            position: relative; z-index: 10; width: 100%; padding: 30px;
            box-sizing: border-box; display: flex; align-items: flex-end; justify-content: space-between;
        }

        .song-info { flex: 1; margin-right: 20px; }
        .song-info h1 { font-size: 24px; margin: 0; font-weight: 700; }
        .song-info p { font-size: 16px; margin: 5px 0 0; color: rgba(255,255,255,0.7); }

        .spotify-link {
            width: 55px; height: 55px; background: #1DB954; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #000; box-shadow: 0 5px 15px rgba(29, 185, 84, 0.4);
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .spotify-link:active { transform: scale(0.8); }

        /* --- HISTORY MODAL --- */
        #history-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; padding: 60px 25px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .history-list { height: 100%; overflow-y: auto; }
        .history-item {
            display: flex; align-items: center; padding: 12px;
            background: var(--glass); border-radius: 15px; margin-bottom: 10px;
        }
        .history-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; }
        .close-history { position: absolute; top: 20px; left: 25px; font-size: 20px; }

        /* Progress Bar (TikTok style thin line) */
        .progress-line {
            position: absolute; bottom: 0; left: 0; height: 3px;
            background: var(--accent); width: 0%; transition: linear;
        }

        .loader { position: absolute; font-size: 30px; opacity: 0.5; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="app-name" style="margin-bottom: 30px; font-size: 40px;">MusicBack</div>
        <div class="start-btn" onclick="startApp()">Entdecken</div>
    </div>

    <div class="app-container">
        <div id="bg-blur"></div>
        
        <header>
            <div class="app-name">MusicBack</div>
            <i class="fas fa-history history-trigger" onclick="toggleHistory(true)"></i>
        </header>

        <div class="feed-container">
            <i class="fas fa-compact-disc loader"></i>
            <div class="cover-wrap" onclick="nextSong()">
                <img id="current-art" src="" alt="">
            </div>
            <div class="progress-line" id="progress"></div>
        </div>

        <div class="bottom-ui">
            <div class="song-info">
                <h1 id="title">Lade...</h1>
                <p id="artist">...</p>
            </div>
            <a href="#" id="spotify-btn" target="_blank" class="spotify-link">
                <i class="fab fa-spotify"></i>
            </a>
        </div>
    </div>

    <div id="history-modal">
        <i class="fas fa-times close-history" onclick="toggleHistory(false)"></i>
        <h2 style="margin-bottom: 25px;">Zuletzt gehört</h2>
        <div class="history-list" id="history-content"></div>
    </div>

    <audio id="player" preload="auto"></audio>

<script>
    const player = document.getElementById('player');
    const history = [];
    let currentTracks = [];

    function startApp() {
        document.getElementById('start-overlay').style.display = 'none';
        fetchNewMusic();
    }

    async function fetchNewMusic() {
        const terms = ['Techno', 'House', 'Electronic', 'Phonk', '90s Rave'];
        const randomTerm = terms[Math.floor(Math.random() * terms.length)];
        
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${randomTerm}&entity=song&limit=30`);
            const data = await r.json();
            currentTracks = data.results.filter(t => t.previewUrl);
            nextSong();
        } catch (e) { console.error("API Error"); }
    }

    function nextSong() {
        if(currentTracks.length === 0) { fetchNewMusic(); return; }
        
        const track = currentTracks.pop();
        const highResArt = track.artworkUrl100.replace('100x100bb', '600x600bb');
        
        // UI Update
        document.getElementById('title').innerText = track.trackName;
        document.getElementById('artist').innerText = track.artistName;
        document.getElementById('current-art').src = highResArt;
        document.getElementById('bg-blur').style.backgroundImage = `url(${highResArt})`;
        document.getElementById('spotify-btn').href = `spotify:search:${encodeURIComponent(track.artistName + ' ' + track.trackName)}`;
        
        // Player
        player.src = track.previewUrl;
        player.play();

        // History
        addToHistory(track);
    }

    function addToHistory(t) {
        history.unshift(t);
        if(history.length > 20) history.pop();
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const container = document.getElementById('history-content');
        container.innerHTML = history.map(t => `
            <div class="history-item" onclick="playFromHistory('${t.previewUrl}', '${t.trackName}', '${t.artistName}', '${t.artworkUrl100}')">
                <img src="${t.artworkUrl100}">
                <div style="flex:1">
                    <div style="font-weight:700; font-size:14px">${t.trackName}</div>
                    <div style="font-size:12px; opacity:0.6">${t.artistName}</div>
                </div>
                <i class="fab fa-spotify" style="color:#1DB954"></i>
            </div>
        `).join('');
    }

    function playFromHistory(url, title, artist, art) {
        player.src = url;
        player.play();
        document.getElementById('title').innerText = title;
        document.getElementById('artist').innerText = artist;
        document.getElementById('current-art').src = art.replace('100x100bb', '600x600bb');
        toggleHistory(false);
    }

    function toggleHistory(show) {
        document.getElementById('history-modal').style.display = show ? 'block' : 'none';
    }

    player.ontimeupdate = () => {
        const p = (player.currentTime / player.duration) * 100;
        document.getElementById('progress').style.width = p + '%';
    };

    player.onended = nextSong;

</script>
</body>
</html>
