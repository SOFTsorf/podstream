<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Podcast Player (iTunes API)</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #ff2d55;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            background: #000;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        input {
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--accent);
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #player-container {
            width: 90%;
            max-width: 800px;
            margin: 20px 0;
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            display: none; /* Sichtbar wenn etwas spielt */
            text-align: center;
        }

        video, audio {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            background: #000;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            width: 90%;
            margin-top: 20px;
        }

        .podcast-card {
            background: var(--card);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }

        .podcast-card:hover {
            transform: scale(1.05);
            border: 1px solid var(--accent);
        }

        .podcast-card img {
            width: 100%;
            border-radius: 5px;
        }

        .podcast-card h4 {
            font-size: 14px;
            margin: 10px 0 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-list {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            background: var(--card);
            border-radius: 10px;
            padding: 15px;
            display: none;
        }

        .episode-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .episode-item:hover {
            background: #2a2a2a;
        }

        .tag {
            font-size: 10px;
            background: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>Podcast Streamer</h1>
    <input type="text" id="search-input" placeholder="Suche nach Podcasts (z.B. Joe Rogan, Tagesschau)...">
    <button onclick="searchPodcasts()">Suchen</button>
</header>

<div id="player-container">
    <h3 id="now-playing-title">Wähle eine Episode</h3>
    <div id="media-wrapper">
        </div>
</div>

<div id="episode-list" class="episode-list">
    <h3>Episoden</h3>
    <div id="episodes-container"></div>
</div>

<div id="results"></div>

<script>
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results');
    const episodeList = document.getElementById('episode-list');
    const episodesContainer = document.getElementById('episodes-container');
    const playerContainer = document.getElementById('player-container');
    const mediaWrapper = document.getElementById('media-wrapper');
    const nowPlayingTitle = document.getElementById('now-playing-title');

    // 1. Suche via iTunes API
    async function searchPodcasts() {
        const term = searchInput.value;
        if (!term) return;

        resultsContainer.innerHTML = "Lade...";
        episodeList.style.display = "none";

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=podcast&limit=12`);
            const data = await response.json();
            displayResults(data.results);
        } catch (error) {
            console.error("Fehler bei der Suche:", error);
            resultsContainer.innerHTML = "Fehler bei der Suche.";
        }
    }

    function displayResults(podcasts) {
        resultsContainer.innerHTML = "";
        podcasts.forEach(podcast => {
            const card = document.createElement('div');
            card.className = 'podcast-card';
            card.innerHTML = `
                <img src="${podcast.artworkUrl600}" alt="Cover">
                <h4>${podcast.collectionName}</h4>
                <p style="font-size: 12px; color: #aaa;">${podcast.artistName}</p>
            `;
            card.onclick = () => loadEpisodes(podcast.feedUrl);
            resultsContainer.appendChild(card);
        });
    }

    // 2. RSS Feed laden und parsen (Wir nutzen einen CORS-Proxy, da RSS-Feeds oft kein CORS erlauben)
    async function loadEpisodes(feedUrl) {
        episodesContainer.innerHTML = "Episoden werden geladen...";
        episodeList.style.display = "block";
        
        // Nutze einen öffentlichen CORS Proxy (für Produktion eigenen Server nutzen!)
        const proxyUrl = "https://api.allorigins.win/get?url=";
        
        try {
            const response = await fetch(proxyUrl + encodeURIComponent(feedUrl));
            const data = await response.json();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const items = xmlDoc.querySelectorAll("item");

            episodesContainer.innerHTML = "";
            items.forEach(item => {
                const title = item.querySelector("title").textContent;
                const enclosure = item.querySelector("enclosure");
                if (!enclosure) return;

                const mediaUrl = enclosure.getAttribute("url");
                const type = enclosure.getAttribute("type"); // z.B. video/mp4 oder audio/mpeg

                const div = document.createElement('div');
                div.className = 'episode-item';
                const isVideo = type.includes("video");
                
                div.innerHTML = `
                    <span>${title}</span>
                    <span class="tag">${isVideo ? 'Video' : 'Audio'}</span>
                `;
                div.onclick = () => playMedia(mediaUrl, title, isVideo);
                episodesContainer.appendChild(div);
            });
            
            // Scrolle zur Liste
            episodeList.scrollIntoView({ behavior: 'smooth' });
        } catch (error) {
            console.error("Fehler beim Laden des Feeds:", error);
            episodesContainer.innerHTML = "Fehler beim Laden des RSS-Feeds.";
        }
    }

    // 3. Media Player steuern
    function playMedia(url, title, isVideo) {
        playerContainer.style.display = "block";
        nowPlayingTitle.innerText = title;
        
        if (isVideo) {
            mediaWrapper.innerHTML = `
                <video controls autoplay name="media">
                    <source src="${url}" type="video/mp4">
                    Dein Browser unterstützt kein Video-Streaming.
                </video>`;
        } else {
            mediaWrapper.innerHTML = `
                <audio controls autoplay name="media">
                    <source src="${url}" type="audio/mpeg">
                    Dein Browser unterstützt kein Audio-Streaming.
                </audio>`;
        }
        
        playerContainer.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
