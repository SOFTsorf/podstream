<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg-color: #121212;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            background-color: var(--bg-color);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* Dynamischer Hintergrund (Blur des Covers) */
        #bg-blur {
            position: absolute; inset: -50px; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.4);
            transition: background-image 0.8s ease-in-out;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--spotify-green); color: white; border: none;
            padding: 18px 60px; border-radius: 40px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
            transition: transform 0.2s;
        }
        .start-btn:active { transform: scale(0.95); }

        /* --- HEADER --- */
        header {
            position: absolute; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px; 
            display: flex; justify-content: center; align-items: center;
        }
        .logo-text { font-size: 18px; font-weight: 600; opacity: 0.9; letter-spacing: 1px; }
        .history-btn { position: absolute; right: 25px; font-size: 22px; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* --- MAIN CONTENT --- */
        #feed-container {
            height: 100dvh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        .visualizer-wrapper {
            display: flex; align-items: center; gap: 20px; width: 100%; justify-content: center;
            transform: translateY(-40px); /* Leicht nach oben geschoben, wegen der unteren Leiste */
        }

        .audio-bars { display: flex; align-items: center; gap: 4px; height: 50px; }
        .bar { 
            width: 4px; background: rgba(255,255,255,0.8); border-radius: 2px; height: 10px; 
            transition: height 0.05s ease;
        }

        .cover-container {
            position: relative; width: 75vw; max-width: 340px; aspect-ratio: 1/1;
            /* Wichtig: Transition nur beim Loslassen, nicht beim Ziehen */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }
        .cover-art {
            position: absolute; inset: 0; width: 100%; height: 100%;
            border-radius: 20px; object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: opacity 0.6s ease-in-out;
        }
        .fade-out { opacity: 0 !important; }

        /* --- SONG INFO & CARD (JETZT UNTEN) --- */
        .info-section {
            position: absolute; bottom: calc(env(safe-area-inset-bottom) + 30px);
            width: 90vw; max-width: 400px;
            transition: opacity 0.5s ease-in-out;
        }
        .artist-tag { font-size: 20px; font-weight: 800; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .bottom-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 25px;
            padding: 15px 20px; display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255,255,255,0.2); position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .song-details { flex: 1; overflow: hidden; }
        .song-details h3 { margin: 0; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-details p { margin: 4px 0 0; font-size: 14px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .action-icon {
            font-size: 24px; cursor: pointer; transition: transform 0.2s, color 0.2s;
            color: white; padding: 5px;
        }
        .action-icon.liked { color: #ff3b30; animation: heartBeat 0.3s forwards; }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .spotify-circle {
            width: 45px; height: 45px; background: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: black; cursor: pointer; z-index: 2; flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .progress-line {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background: var(--spotify-green); width: 0%; border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.7); display: none;
            align-items: center; justify-content: center; padding: 25px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .modal-box {
            background: #222; color: white; width: 100%; max-width: 320px;
            border-radius: 30px; padding: 35px 25px; text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-box h2 { margin: 0 0 10px; font-size: 22px; }
        .modal-box p { margin: 0 0 25px; color: #aaa; font-size: 15px; line-height: 1.4; }
        .btn-green {
            background: var(--spotify-green); color: black; border: none; width: 100%;
            padding: 16px; border-radius: 40px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-bottom: 15px;
        }
        .btn-text { background: none; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; opacity: 0.7;}

        /* --- HISTORY PANEL (ANIMIERT) --- */
        #history-panel {
            position: fixed; inset: 0; background: #121212; z-index: 5000;
            padding: calc(env(safe-area-inset-top) + 80px) 20px 20px; overflow-y: auto;
            transform: translateX(100%); /* Startet außerhalb des Bildschirms */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #history-panel.active { transform: translateX(0); /* Slidet rein */ }
        
        .history-item {
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px;
            cursor: pointer; transition: background 0.2s;
        }
        .history-item:active { background: rgba(255,255,255,0.1); }
        .history-item img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover;}
        .history-item.active-history-item { border-left: 4px solid var(--spotify-green); background: rgba(255,255,255,0.08); }

        /* Animation für fliegende Herzen (Doppeltipp) */
        .floating-heart {
            position: absolute; font-size: 80px; color: #ff3b30;
            pointer-events: none; opacity: 0; z-index: 100;
            transform: translate(-50%, -50%) scale(0.5);
            animation: floatHeartAnim 0.8s ease-out forwards;
        }
        @keyframes floatHeartAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }
    </style>
</head>
<body>

    <div id="bg-blur"></div>

    <div id="start-screen">
        <h1 style="margin-bottom: 20px;">MusicBack</h1>
        <button class="start-btn" onclick="startApp()">Start</button>
    </div>

    <header>
        <div class="logo-text">MusicBack</div>
        <i class="fas fa-history history-btn" onclick="toggleHistory(true)"></i>
    </header>

    <div id="feed-container">
        <div class="visualizer-wrapper" id="visualizer">
            <div class="audio-bars" id="bars-left">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            
            <div class="cover-container" id="cover-container">
                <img id="main-cover" class="cover-art" src="" alt="">
            </div>

            <div class="audio-bars" id="bars-right">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div class="info-section" id="info-section">
            <div class="artist-tag" id="display-artist">Artist</div>
            <div class="bottom-card">
                <div class="song-details">
                    <h3 id="display-title">Song Title</h3>
                    <p id="display-album">Album Name</p>
                </div>
                <i class="fas fa-heart action-icon" id="like-btn" onclick="toggleLike(event)"></i>
                <div class="spotify-circle" onclick="triggerSpotify(event)">
                    <i class="fab fa-spotify"></i>
                </div>
                <div class="progress-line" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2>Bist du sicher?</h2>
            <p>MusicBack wird pausiert und du wirst direkt zum Song auf Spotify weitergeleitet.</p>
            <button class="btn-green" onclick="confirmSpotify()">Auf Spotify öffnen</button>
            <button class="btn-text" onclick="closeModal()">Abbrechen</button>
        </div>
    </div>

    <div id="history-panel">
        <i class="fas fa-chevron-left" style="position:absolute; top:calc(env(safe-area-inset-top) + 30px); left:20px; font-size:24px; cursor:pointer;" onclick="toggleHistory(false)"></i>
        <h2 style="margin-bottom:25px; margin-top:0;">Dein Verlauf</h2>
        <div id="history-list"></div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

<script>
    const player = document.getElementById('player');
    const allBars = document.querySelectorAll('.bar');
    const coverContainer = document.getElementById('cover-container');
    const likeBtn = document.getElementById('like-btn');
    
    // Playback State
    let tracks = [];
    let playedHistory = [];
    let likedSongs = new Set(); // Speichert gelikte Track-IDs
    let currentIndex = -1;
    let isTransitioning = false;

    // Swipe State
    let startY = 0;
    let isDragging = false;
    let lastTapTime = 0;

    // Web Audio API
    let audioCtx, analyser, dataArray;

    async function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(player);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            drawVisualizer();
        }
        await loadMusic();
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!player.paused) {
            analyser.getByteFrequencyData(dataArray);
            if (allBars.length >= 6) {
                allBars[0].style.height = 10 + (dataArray[2] / 255) * 35 + 'px';
                allBars[1].style.height = 10 + (dataArray[4] / 255) * 35 + 'px';
                allBars[2].style.height = 10 + (dataArray[6] / 255) * 35 + 'px';
                allBars[3].style.height = 10 + (dataArray[6] / 255) * 35 + 'px';
                allBars[4].style.height = 10 + (dataArray[4] / 255) * 35 + 'px';
                allBars[5].style.height = 10 + (dataArray[2] / 255) * 35 + 'px';
            }
        } else {
            allBars.forEach(bar => bar.style.height = '10px');
        }
    }

    async function loadMusic() {
        // Größeres Limit für längeren Spaß
        const res = await fetch('https://itunes.apple.com/search?term=techno&entity=song&limit=100');
        const data = await res.json();
        tracks = data.results.filter(t => t.previewUrl);
        playNextTrack();
    }

    function playNextTrack() {
        if (isTransitioning) return;
        if (currentIndex < playedHistory.length - 1) {
            currentIndex++;
            loadTrackIntoUI(playedHistory[currentIndex]);
        } else {
            if(tracks.length === 0) return;
            const newTrack = tracks.splice(Math.floor(Math.random() * tracks.length), 1)[0];
            playedHistory.push(newTrack);
            currentIndex++;
            loadTrackIntoUI(newTrack);
        }
    }

    function playPrevTrack() {
        if (isTransitioning || currentIndex <= 0) return;
        currentIndex--;
        loadTrackIntoUI(playedHistory[currentIndex]);
    }

    function playSpecificTrack(index) {
        if (index === currentIndex || isTransitioning) return;
        currentIndex = index;
        loadTrackIntoUI(playedHistory[currentIndex]);
        toggleHistory(false);
    }

    function loadTrackIntoUI(track) {
        isTransitioning = true;
        const mainCover = document.getElementById('main-cover');
        const infoSection = document.getElementById('info-section');
        const bgBlur = document.getElementById('bg-blur');

        // Like-Status aktualisieren
        if(likedSongs.has(track.trackId)) {
            likeBtn.classList.add('liked');
            likeBtn.classList.replace('far', 'fas');
        } else {
            likeBtn.classList.remove('liked');
            likeBtn.classList.replace('fas', 'far'); // Outline Herz
        }

        let vol = player.volume;
        const fadeOut = setInterval(() => {
            if (vol > 0.1) {
                vol -= 0.1;
                player.volume = vol;
            } else {
                clearInterval(fadeOut);
                player.pause();
                
                mainCover.classList.add('fade-out');
                infoSection.style.opacity = '0';

                setTimeout(() => {
                    const art = track.artworkUrl100.replace('100x100bb', '600x600bb');
                    mainCover.src = art;
                    bgBlur.style.backgroundImage = `url('${art}')`;
                    
                    document.getElementById('display-artist').innerText = track.artistName;
                    document.getElementById('display-title').innerText = track.trackName;
                    document.getElementById('display-album').innerText = track.collectionName;

                    player.src = track.previewUrl;
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    player.play();
                    
                    mainCover.classList.remove('fade-out');
                    infoSection.style.opacity = '1';

                    let volIn = 0;
                    const fadeIn = setInterval(() => {
                        if (volIn < 0.9) {
                            volIn += 0.1;
                            player.volume = volIn;
                        } else {
                            player.volume = 1;
                            clearInterval(fadeIn);
                            isTransitioning = false;
                            updateHistory();
                        }
                    }, 50);
                }, 400); 
            }
        }, 30); 
    }

    // --- NEUE SWIPE LOGIK & DOPPELTIPP ---
    coverContainer.addEventListener('touchstart', e => {
        if (isTransitioning) return;
        startY = e.touches[0].clientY;
        isDragging = true;
        // Animation beim Ziehen ausschalten, damit es sofort folgt
        coverContainer.style.transition = 'none'; 
    });

    coverContainer.addEventListener('touchmove', e => {
        if (!isDragging || isTransitioning) return;
        const diff = e.touches[0].clientY - startY;
        
        // Fühlt sich natürlicher an, wenn es etwas Widerstand hat (* 0.6)
        coverContainer.style.transform = `translateY(${diff * 0.6}px) scale(0.95)`;
    });

    coverContainer.addEventListener('touchend', e => {
        if (!isDragging) return;
        isDragging = false;
        const diff = e.changedTouches[0].clientY - startY;
        
        // Animation wieder einschalten fürs Zurückschnappen
        coverContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
        coverContainer.style.transform = 'translateY(0) scale(1)';

        // Wisch-Schwellenwert überschritten?
        if (diff < -80) { // Nach oben
            if (navigator.vibrate) navigator.vibrate(40); // Kurze Vibration
            playNextTrack();
        } else if (diff > 80 && currentIndex > 0) { // Nach unten
            if (navigator.vibrate) navigator.vibrate(40);
            playPrevTrack();
        } else if (Math.abs(diff) < 10) { 
            // Tap / Klick Erkennung (inkl. Doppeltipp für Like)
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            if (tapLength < 300 && tapLength > 0) {
                // Doppeltipp erkannt
                toggleLike(null, true, e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            } else {
                // Einfacher Tap -> Play/Pause
                setTimeout(() => {
                    // Verhindert, dass Play/Pause triggert, wenn es eigentlich ein Doppeltipp wird
                    if(new Date().getTime() - lastTapTime >= 300) togglePlayPause();
                }, 300);
            }
            lastTapTime = currentTime;
        }
    });

    // --- INTERAKTIONEN ---
    function togglePlayPause() {
        if (isTransitioning) return;
        if (player.paused) {
            player.play();
            coverContainer.style.transform = "scale(1)";
        } else {
            player.pause();
            coverContainer.style.transform = "scale(0.92)"; 
        }
    }

    function toggleLike(e, isDoubleTap = false, x = 0, y = 0) {
        if(e) e.stopPropagation();
        if(currentIndex === -1) return;

        const track = playedHistory[currentIndex];
        const isLiked = likedSongs.has(track.trackId);

        if(isLiked && !isDoubleTap) {
            likedSongs.delete(track.trackId);
            likeBtn.classList.remove('liked');
            likeBtn.classList.replace('fas', 'far');
        } else if (!isLiked) {
            likedSongs.add(track.trackId);
            likeBtn.classList.add('liked');
            likeBtn.classList.replace('far', 'fas');
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]); // Herzschlag-Vibration
        }

        // Visuelles Feedback beim Doppeltipp auf das Cover
        if(isDoubleTap) {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart floating-heart';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }
    }

    function triggerSpotify(event) {
        event.stopPropagation();
        player.pause();
        coverContainer.style.transform = "scale(0.92)";
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        player.play();
        coverContainer.style.transform = "scale(1)";
    }

    function confirmSpotify() {
        const track = playedHistory[currentIndex];
        const url = `spotify:search:${encodeURIComponent(track.artistName + ' ' + track.trackName)}`;
        window.open(url, '_blank');
        closeModal();
    }

    // --- HISTORY ANIMIERT ---
    function updateHistory() {
        const list = document.getElementById('history-list');
        let html = '';
        for (let i = playedHistory.length - 1; i >= 0; i--) {
            const t = playedHistory[i];
            const isActive = i === currentIndex ? 'active-history-item' : '';
            html += `
                <div class="history-item ${isActive}" onclick="playSpecificTrack(${i})">
                    <img src="${t.artworkUrl100}">
                    <div style="flex:1">
                        <b style="font-size: 15px;">${t.trackName}</b><br>
                        <small style="color: #aaa;">${t.artistName}</small>
                    </div>
                    ${isActive ? '<i class="fas fa-volume-up" style="color: var(--spotify-green);"></i>' : ''}
                </div>
            `;
        }
        list.innerHTML = html;
    }

    function toggleHistory(show) {
        const panel = document.getElementById('history-panel');
        if(show) {
            updateHistory();
            panel.classList.add('active');
        } else {
            panel.classList.remove('active');
        }
    }

    player.ontimeupdate = () => {
        const p = (player.currentTime / player.duration) * 100;
        document.getElementById('progress-bar').style.width = p + '%';
    };

    player.onended = playNextTrack;
</script>
</body>
</html>
