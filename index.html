<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            /* 100dvh löst Probleme mit der URL-Leiste auf mobilen Geräten */
            height: 100dvh; 
            background-color: #000; color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; touch-action: none; /* Verhindert das normale Scrollen */
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #start-screen h1 {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #start-screen p { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; }

        .start-btn {
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 48px; border-radius: 50px; font-size: 1.2rem; font-weight: 600;
            backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .start-btn:hover, .start-btn:active {
            background: white; color: black; transform: scale(1.05);
        }

        /* --- DYNAMISCHER HINTERGRUND --- */
        #blur-bg {
            position: absolute; inset: -20%; width: 140%; height: 140%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.3); z-index: 0; 
            transition: background-image 0.8s ease-in-out;
        }

        /* --- HEADER --- */
        header {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
            padding: 50px 25px 20px; /* Padding top für Notches auf dem Handy */
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
        }
        
        .header-spacer { width: 24px; } /* Für saubere Zentrierung */
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .history-btn { font-size: 24px; cursor: pointer; opacity: 0.9; transition: opacity 0.2s; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .history-btn:active { opacity: 0.5; }

        /* --- TIKTOK CONTENT AREA (SWIPE ZONE) --- */
        .feed-container {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Cover Art Container mit Animation */
        .cover-container {
            position: relative; width: 80vw; max-width: 360px; aspect-ratio: 1/1;
            transition: transform 0.3s ease;
        }

        .cover-art {
            width: 100%; height: 100%; border-radius: 16px; object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }

        /* Pulsing Effekt wenn die Musik läuft */
        .playing .cover-art { animation: pulse 4s infinite ease-in-out; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
            50% { transform: scale(1.03); box-shadow: 0 30px 60px rgba(0,0,0,1); }
            100% { transform: scale(1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        }

        /* Play/Pause Overlay Icon */
        #play-pause-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; color: rgba(255,255,255,0.8); z-index: 6;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .paused #play-pause-icon { opacity: 1; }

        /* --- SPOTIFY BOTTOM CARD --- */
        .bottom-card {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90vw; max-width: 450px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .song-details { flex: 1; overflow: hidden; margin-right: 15px; }
        .song-details h3 { 
            margin: 0; font-size: 18px; font-weight: 600; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .song-details p { 
            margin: 5px 0 0; font-size: 15px; color: var(--text-muted); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .spotify-logo-btn {
            width: 50px; height: 50px; background: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #000; text-decoration: none; 
            transition: transform 0.2s, background 0.2s; flex-shrink: 0;
        }
        .spotify-logo-btn:active { transform: scale(0.9); background: #189e47; }

        /* --- PROGRESS BAR --- */
        .progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
            background: rgba(255,255,255,0.1); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            overflow: hidden;
        }
        #progress-bar { height: 100%; background: var(--spotify-green); width: 0%; transition: width 0.1s linear; }

        /* --- HISTORY PANEL --- */
        #history-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        
        #history-panel.open { transform: translateX(0); }

        .history-header {
            padding: 50px 25px 20px; display: flex; align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .history-close { font-size: 24px; cursor: pointer; padding-right: 20px; }
        .history-header h2 { margin: 0; font-size: 20px; font-weight: 600; }

        .history-list { flex: 1; overflow-y: auto; padding: 20px 15px; }
        
        .history-item {
            display: flex; align-items: center; padding: 12px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 16px; margin-bottom: 12px; cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .history-item:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .history-item img { width: 56px; height: 56px; border-radius: 10px; margin-right: 15px; object-fit: cover; }
        .history-item-info { flex: 1; overflow: hidden; }
        .history-item-info h4 { margin: 0 0 4px; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item-info p { margin: 0; font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Swipe Guide Animation */
        .swipe-guide {
            position: absolute; bottom: 120px; color: rgba(255,255,255,0.5);
            font-size: 14px; display: flex; flex-direction: column; align-items: center;
            animation: bounce 2s infinite; pointer-events: none; z-index: 5;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>MusicBack</h1>
        <p>Swipe, entdecke, höre.</p>
        <button class="start-btn" onclick="initApp()">Entdecken starten</button>
    </div>

    <div id="blur-bg"></div>

    <header>
        <div class="header-spacer"></div> <div class="logo-text">MusicBack</div>
        <i class="fas fa-history history-btn" onclick="toggleHistory(true)"></i>
    </header>

    <div class="feed-container" id="feed-area">
        <div class="cover-container" id="cover-container">
            <img id="main-cover" class="cover-art" src="" alt="Album Cover">
            <i class="fas fa-play" id="play-pause-icon"></i>
        </div>
        
        <div class="swipe-guide" id="swipe-guide">
            <i class="fas fa-chevron-up"></i>
            <span>Swipe</span>
        </div>
    </div>

    <div class="bottom-card">
        <div class="song-details">
            <h3 id="song-title">Lade Musik...</h3>
            <p id="song-artist">Einen Moment bitte</p>
        </div>
        <a href="#" id="spotify-link" target="_blank" class="spotify-logo-btn" onclick="event.stopPropagation();">
            <i class="fab fa-spotify"></i>
        </a>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="history-panel">
        <div class="history-header">
            <i class="fas fa-chevron-down history-close" onclick="toggleHistory(false)"></i>
            <h2>Zuletzt gehört</h2>
        </div>
        <div class="history-list" id="history-content">
            </div>
    </div>

    <audio id="audio-player"></audio>

<script>
    const audio = document.getElementById('audio-player');
    const coverContainer = document.getElementById('cover-container');
    const historyData = [];
    let tracks = [];
    let isPlaying = false;

    // Genres für mehr Abwechslung
    const genres = ['Phonk', 'Techno', 'House', 'Cyberpunk', 'Hip Hop', 'Pop', 'Indie', 'Rock'];

    async function initApp() {
        // Startbildschirm ausblenden
        const startScreen = document.getElementById('start-screen');
        startScreen.style.opacity = '0';
        setTimeout(() => startScreen.style.display = 'none', 600);
        
        await fetchTracks();
    }

    async function fetchTracks() {
        const randomGenre = genres[Math.floor(Math.random() * genres.length)];
        try {
            // iTunes API (Limit 50 für mehr Swipes)
            const r = await fetch(`https://itunes.apple.com/search?term=${randomGenre}&entity=song&limit=50`);
            const data = await r.json();
            
            // Nur Tracks mit Vorschau behalten und mischen
            tracks = data.results
                .filter(t => t.previewUrl)
                .sort(() => Math.random() - 0.5);
            
            nextTrack();
        } catch (e) { 
            document.getElementById('song-title').innerText = "Fehler beim Laden";
            document.getElementById('song-artist').innerText = "Bitte Seite neu laden";
        }
    }

    function nextTrack() {
        // Wenn Playlist fast leer ist, neue holen
        if(tracks.length < 3) fetchTracks();
        if(tracks.length === 0) return;
        
        // Track aus der Liste nehmen
        const track = tracks.pop();
        
        // Hochauflösendes Cover anfordern (600x600 statt 100x100)
        const artUrl = track.artworkUrl100.replace('100x100bb', '600x600bb');
        
        // UI aktualisieren
        document.getElementById('song-title').innerText = track.trackName;
        document.getElementById('song-artist').innerText = track.artistName;
        document.getElementById('main-cover').src = artUrl;
        document.getElementById('blur-bg').style.backgroundImage = `url(${artUrl})`;
        
        // Spotify Such-Link generieren (Web-URL öffnet sich auf Handys meistens direkt in der App)
        const query = encodeURIComponent(`${track.artistName} ${track.trackName}`);
        document.getElementById('spotify-link').href = `https://open.spotify.com/search/${query}`;

        // Audio starten
        audio.src = track.previewUrl;
        playAudio();

        // Zur Historie hinzufügen (Duplikate vermeiden)
        if (!historyData.some(t => t.trackId === track.trackId)) {
            historyData.unshift(track);
            // Historie auf 50 Einträge begrenzen
            if(historyData.length > 50) historyData.pop();
            renderHistory();
        }

        // Swipe Guide nach dem ersten Swipe verstecken
        if(historyData.length > 1) {
            document.getElementById('swipe-guide').style.display = 'none';
        }
    }

    function playAudio() {
        audio.play();
        isPlaying = true;
        coverContainer.classList.add('playing');
        coverContainer.classList.remove('paused');
    }

    function pauseAudio() {
        audio.pause();
        isPlaying = false;
        coverContainer.classList.remove('playing');
        coverContainer.classList.add('paused');
    }

    function togglePlayPause() {
        if (isPlaying) {
            pauseAudio();
        } else {
            playAudio();
        }
    }

    // --- TIKTOK SWIPE LOGIC ---
    let startY = 0;
    let endY = 0;
    const feedArea = document.getElementById('feed-area');

    // Touch für Mobile
    feedArea.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
    });

    feedArea.addEventListener('touchend', (e) => {
        endY = e.changedTouches[0].clientY;
        handleSwipe();
    });

    // Tap zum Pausieren/Abspielen
    feedArea.addEventListener('click', (e) => {
        // Ignorieren, wenn es ein Wischvorgang war
        if (Math.abs(startY - endY) < 10) {
            togglePlayPause();
        }
    });

    function handleSwipe() {
        const swipeDistance = startY - endY;
        // Wisch nach oben (nächster Track)
        if (swipeDistance > 50) {
            // Kurze Animation fürs Swipen
            coverContainer.style.transform = "translateY(-100vh) scale(0.8)";
            setTimeout(() => {
                nextTrack();
                coverContainer.style.transition = "none";
                coverContainer.style.transform = "translateY(100vh) scale(0.8)";
                setTimeout(() => {
                    coverContainer.style.transition = "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                    coverContainer.style.transform = "translateY(0) scale(1)";
                }, 50);
            }, 300);
        }
    }

    // --- HISTORY FUNKTIONEN ---
    function renderHistory() {
        const content = document.getElementById('history-content');
        content.innerHTML = historyData.map(t => {
            const artSmall = t.artworkUrl100.replace('100x100bb', '200x200bb');
            return `
            <div class="history-item" onclick="playFromHistory('${t.previewUrl}', '${t.trackName.replace(/'/g, "\\'")}', '${t.artistName.replace(/'/g, "\\'")}', '${t.artworkUrl100}')">
                <img src="${artSmall}" loading="lazy">
                <div class="history-item-info">
                    <h4>${t.trackName}</h4>
                    <p>${t.artistName}</p>
                </div>
                <i class="fab fa-spotify" style="color:var(--spotify-green); font-size:24px; padding-left:10px;"></i>
            </div>
            `;
        }).join('');
    }

    function playFromHistory(url, title, artist, artUrl) {
        // UI Updaten
        const highResArt = artUrl.replace('100x100bb', '600x600bb');
        document.getElementById('song-title').innerText = title;
        document.getElementById('song-artist').innerText = artist;
        document.getElementById('main-cover').src = highResArt;
        document.getElementById('blur-bg').style.backgroundImage = `url(${highResArt})`;
        
        const query = encodeURIComponent(`${artist} ${title}`);
        document.getElementById('spotify-link').href = `https://open.spotify.com/search/${query}`;

        // Audio abspielen
        audio.src = url;
        playAudio();
        
        // Panel schließen
        toggleHistory(false);
    }

    function toggleHistory(show) {
        const panel = document.getElementById('history-panel');
        if(show) {
            panel.classList.add('open');
        } else {
            panel.classList.remove('open');
        }
    }

    // --- AUDIO EVENTS ---
    audio.ontimeupdate = () => {
        if(!audio.duration) return;
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-bar').style.width = p + '%';
    };

    audio.onended = () => {
        // Automatisch nächster Track, wenn der alte zu Ende ist (wie bei TikTok)
        nextTrack();
    };

</script>
</body>
</html>
