<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MusicBack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg-color: #121212;
            --card-bg: rgba(42, 42, 42, 0.6); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; touch-action: none;
        }

        #bg-blur {
            position: fixed; 
            top: -10%; left: -10%; width: 120%; height: 120%; 
            z-index: 0; 
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.4);
            transition: background-image 0.8s ease-in-out;
        }

        .gradient-top {
            position: fixed; top: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            z-index: 20; pointer-events: none;
        }
        
        .gradient-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0) 100%);
            z-index: 20; pointer-events: none;
        }

        #start-screen {
            position: fixed; inset: 0; z-index: 10000; background: #121212;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--spotify-green); color: black; border: none;
            padding: 18px 60px; border-radius: 40px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
            transition: transform 0.2s;
        }
        .start-btn:active { transform: scale(0.95); }

        header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; z-index: 30;
            padding: calc(env(safe-area-inset-top) + 15px) 25px 10px; 
            display: flex; justify-content: center; align-items: center;
        }
        
        .logo-text { 
            font-size: 18px; font-weight: 700; letter-spacing: 0.5px; 
        }

        .header-icon-left {
            position: absolute; left: 25px; font-size: 22px; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.5); transition: transform 0.2s;
        }
        .header-icon-left:active { transform: scale(0.8); }
        
        .header-actions {
            position: absolute; right: 25px; display: flex; gap: 20px; align-items: center;
        }
        .header-icon { font-size: 22px; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .header-icon:active { transform: scale(0.8); }

        .category-container {
            position: absolute; top: calc(env(safe-area-inset-top) + 55px); left: 0; width: 100%;
            display: flex; gap: 10px; padding: 10px 25px; overflow-x: auto; z-index: 30;
            scrollbar-width: none; 
        }
        .category-container::-webkit-scrollbar { display: none; }
        .category-pill {
            background: rgba(255, 255, 255, 0.15); color: white; border: none; 
            padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; 
            white-space: nowrap; cursor: pointer; transition: background 0.2s, transform 0.1s;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .category-pill:active { transform: scale(0.95); }
        .category-pill.active { background: var(--spotify-green); color: black; }

        #feed-container {
            height: 100dvh; width: 100vw; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        .visualizer-wrapper {
            display: flex; align-items: center; gap: 20px; width: 100%; justify-content: center;
            transform: translateY(-20px);
            z-index: 10;
        }

        .audio-bars { display: flex; align-items: center; gap: 4px; height: 50px; z-index: 10; }
        .bar { 
            width: 4px; background: rgba(255,255,255,0.8); border-radius: 2px; height: 10px; 
            transition: height 0.05s ease;
        }

        .cover-container {
            position: relative; width: 75vw; max-width: 340px; aspect-ratio: 1/1;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10; 
        }
        
        .cover-art {
            position: absolute; inset: 0; width: 100%; height: 100%;
            border-radius: 10px; object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: opacity 0.6s ease-in-out, box-shadow 0.1s ease-out; 
            z-index: 2;
        }
        .fade-out { opacity: 0 !important; }

        .feedback-icon {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 90px; color: #ff3b30; opacity: 0; z-index: 20; transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .feedback-icon.show { opacity: 1; transform: scale(1); }

        .big-heart-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 110px; color: var(--spotify-green); opacity: 0; z-index: 25; pointer-events: none;
            text-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .big-heart-overlay.animate {
            animation: popBigHeart 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popBigHeart {
            0% { transform: scale(0); opacity: 0; }
            15% { transform: scale(1.3); opacity: 1; }
            30% { transform: scale(1); opacity: 1; }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; }
        }

        .info-section {
            position: absolute; bottom: calc(env(safe-area-inset-bottom) + 30px);
            width: 85vw; max-width: 400px;
            transition: opacity 0.5s ease-in-out;
            display: flex; flex-direction: column; align-items: stretch;
            z-index: 30; 
        }
        .artist-tag { 
            font-size: 22px; font-weight: 800; margin-bottom: 12px; margin-left: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); text-align: left;
        }

        .bottom-card {
            background: var(--card-bg); border-radius: 25px;
            padding: 15px 20px; display: flex; align-items: center; gap: 12px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .song-details { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; gap: 2px;}
        .scroll-container {
            width: 100%; overflow: hidden; white-space: nowrap; position: relative; mask-image: linear-gradient(to right, black 90%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }
        .scroll-text {
            display: inline-block; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 5px;
        }
        .scroll-subtext {
            display: inline-block; font-size: 14px; opacity: 0.7;
        }
        .marquee-active { animation: scroll-left 8s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .time-display { font-size: 12px; color: rgba(255,255,255,0.6); font-variant-numeric: tabular-nums; }

        .action-icon {
            font-size: 24px; cursor: pointer; transition: transform 0.2s, color 0.2s;
            color: white; padding: 5px;
        }
        .action-icon.liked { color: #ff3b30; animation: heartBeat 0.3s forwards; }

        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .spotify-circle {
            width: 45px; height: 45px; background: var(--spotify-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: black; cursor: pointer; z-index: 2; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .spotify-circle:active { transform: scale(0.9); }

        .progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.1); cursor: pointer; z-index: 5;
        }
        .progress-line {
            height: 100%; background: var(--spotify-green); width: 0%; 
            border-radius: 0 3px 3px 0; transition: width 0.1s linear; pointer-events: none;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .side-panel {
            position: fixed; inset: 0; background: #121212; z-index: 5000;
            padding: calc(env(safe-area-inset-top) + 80px) 20px 20px; overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .side-panel.active { transform: translateX(0); }
        .side-panel.left-panel { transform: translateX(-100%); }
        .side-panel.left-panel.active { transform: translateX(0); }
        
        .panel-header {
            position: absolute; top: calc(env(safe-area-inset-top) + 20px); left: 20px; right: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .panel-back { position: absolute; left: 0; font-size: 24px; cursor: pointer; padding: 10px; z-index: 11; }
        .panel-back-right { position: absolute; right: 0; font-size: 24px; cursor: pointer; padding: 10px; z-index: 11; }
        .panel-title { margin: 0; font-size: 20px; font-weight: bold; }

        .search-container {
            margin-top: 15px; position: relative; width: 100%; margin-bottom: 20px;
        }
        .search-input {
            width: 100%; padding: 15px 45px; border-radius: 25px; border: none;
            background: #2a2a2a; color: white; font-size: 16px; outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .search-container i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #aaa;
        }

        .vinyl-list {
            padding-top: 10px;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .vinyl-item {
            position: relative;
            background: #1e1e1e;
            border-radius: 10px;
            height: 70px;
            display: flex;
            align-items: center;
            padding-left: 10px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .vinyl-item:active { transform: scale(0.98); }
        .vinyl-item.active-history-item { border-color: var(--spotify-green); background: #2a2a2a;}
        
        .vinyl-sleeve {
            width: 50px; height: 50px; border-radius: 6px;
            object-fit: cover; z-index: 3;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .vinyl-disc {
            position: absolute; left: 30px; width: 48px; height: 48px;
            border-radius: 50%; z-index: 2;
            background: repeating-radial-gradient(#111, #111 2px, #1a1a1a 3px, #1a1a1a 4px);
            border: 1px solid #333;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .vinyl-disc::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 14px; height: 14px; background: #fff; border-radius: 50%; border: 1px solid #000;
        }
        
        .vinyl-item.active-history-item .vinyl-disc {
            transform: translateX(25px);
            animation: spin 3s linear infinite;
        }
        @keyframes spin { 100% { transform: translateX(25px) rotate(360deg); } }
        
        .vinyl-info {
            flex: 1; padding: 0 10px 0 45px; overflow: hidden; z-index: 4;
            display: flex; flex-direction: column; justify-content: center;
        }
        .vinyl-info b { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px;}
        .vinyl-info small { color: #aaa; font-size: 13px; }

        /* --- VERBESSERTES E-TAG --- */
        .explicit-tag {
            background: #b3b3b3; color: #121212; font-size: 9px; padding: 2px 5px; 
            border-radius: 3px; font-weight: 800; display: inline-flex; 
            align-items: center; justify-content: center; margin-left: 2px;
            line-height: 1; height: 14px;
        }

        .list-container { margin-top: 10px; }
        .list-item { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            background: #2a2a2a; padding: 10px; border-radius: 15px;
            transition: background 0.2s; cursor: pointer;
        }
        .list-item:active { transform: scale(0.98); }
        .list-item img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover;}
        .list-item-info { flex: 1; overflow: hidden; }
        .list-item-info b { font-size: 15px; display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-info small { color: #aaa; }
        
        .list-actions { display: flex; gap: 15px; align-items: center; padding-right: 5px; z-index: 10;}
        .list-btn { font-size: 18px; color: #fff; opacity: 0.7; cursor: pointer; transition: opacity 0.2s; }
        .list-btn:active { opacity: 1; transform: scale(0.9); }
        .list-btn.delete { color: #ff3b30; }
        .list-btn.play { color: var(--spotify-green); }

        .loader {
            display: none; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--spotify-green);
            border-radius: 50%; width: 24px; height: 24px; animation: loadSpin 1s linear infinite; margin: 20px auto;
        }
        @keyframes loadSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #modal-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.8); display: none;
            align-items: center; justify-content: center; padding: 25px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .modal-box {
            background: #222; color: white; width: 100%; max-width: 320px;
            border-radius: 30px; padding: 35px 25px; text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h2 { margin: 0 0 10px; font-size: 22px; }
        .modal-box p { margin: 0 0 25px; color: #aaa; font-size: 15px; line-height: 1.4; }
        .btn-green {
            background: var(--spotify-green); color: black; border: none; width: 100%;
            padding: 16px; border-radius: 40px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-bottom: 15px;
        }
        .btn-text { background: none; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; opacity: 0.7;}

    </style>
</head>
<body>

    <div id="bg-blur"></div>
    <div class="gradient-top"></div>
    <div class="gradient-bottom"></div>

    <div id="start-screen">
        <h1 style="margin-bottom: 20px;">MusicBack</h1>
        <button class="start-btn" onclick="startApp()">Start</button>
    </div>

    <header>
        <i class="fas fa-search header-icon-left" onclick="toggleSearch(true)"></i>
        <div class="logo-text">MusicBack</div>
        <div class="header-actions">
            <i class="fas fa-heart header-icon" onclick="toggleLikes(true)"></i>
            <i class="fas fa-history header-icon" onclick="toggleHistory(true)"></i>
        </div>
    </header>

    <div class="category-container">
        <button class="category-pill active" onclick="changeCategory('Top Hits', this)">Alle</button>
        <button class="category-pill" onclick="changeCategory('Techno', this)">Techno</button>
        <button class="category-pill" onclick="changeCategory('House', this)">House</button>
        <button class="category-pill" onclick="changeCategory('Hip-Hop', this)">Hip-Hop</button>
        <button class="category-pill" onclick="changeCategory('Pop', this)">Pop</button>
    </div>

    <div id="feed-container">
        <div class="visualizer-wrapper" id="visualizer">
            <div class="audio-bars" id="bars-left">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            
            <div class="cover-container" id="cover-container">
                <img id="main-cover" class="cover-art" src="" alt="">
                <div id="feedback-icon" class="feedback-icon"><i class="fas fa-thumbs-down"></i></div>
                <div id="big-heart-icon" class="big-heart-overlay"><i class="fas fa-heart"></i></div>
            </div>

            <div class="audio-bars" id="bars-right">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div class="info-section" id="info-section">
            <div class="artist-tag" id="display-top-artist">Artist</div>
            <div class="bottom-card">
                <div class="song-details">
                    <div class="scroll-container" id="title-container">
                        <span class="scroll-text" id="display-title">Song Title</span>
                    </div>
                    <div class="scroll-container" id="artist-container">
                        <span class="scroll-subtext" id="display-artist">Artist Name</span>
                    </div>
                </div>
                <div class="time-display" id="time-display">0:00 / 0:30</div> 
                <i class="fas fa-heart action-icon" id="like-btn" onclick="toggleLike(event)"></i>
                <div class="spotify-circle" onclick="triggerSpotify(event)">
                    <i class="fab fa-spotify"></i>
                </div>
                <div class="progress-container" id="progress-container" onclick="seekSong(event)">
                    <div class="progress-line" id="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2>Auf Spotify öffnen?</h2>
            <p>MusicBack wird pausiert und du wirst direkt zum Song weitergeleitet.</p>
            <button class="btn-green" onclick="confirmSpotify()">Öffnen</button>
            <button class="btn-text" onclick="closeModal()">Abbrechen</button>
        </div>
    </div>

    <div id="search-panel" class="side-panel left-panel">
        <div class="panel-header">
            <h2 class="panel-title">Suche</h2>
            <i class="fas fa-times panel-back-right" onclick="toggleSearch(false)"></i>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" class="search-input" placeholder="Songs, Künstler suchen..." onkeypress="handleSearch(event)">
        </div>
        <div id="search-loader" class="loader"></div>
        <div id="search-results" class="list-container">
            <p style="text-align:center; color:#aaa; font-size:14px; margin-top:30px;">Tippe etwas ein und drücke Enter (oder Suchen auf der Tastatur).</p>
        </div>
    </div>

    <div id="history-panel" class="side-panel">
        <div class="panel-header">
            <i class="fas fa-chevron-left panel-back" onclick="toggleHistory(false)"></i>
            <h2 class="panel-title">Plattenkiste</h2>
        </div>
        <div id="history-list" class="vinyl-list"></div>
    </div>

    <div id="likes-panel" class="side-panel">
        <div class="panel-header">
            <i class="fas fa-chevron-left panel-back" onclick="toggleLikes(false)"></i>
            <h2 class="panel-title">Favoriten</h2>
        </div>
        <div id="likes-list" class="list-container"></div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

<script>
    const player = document.getElementById('player');
    const allBars = document.querySelectorAll('.bar');
    const coverContainer = document.getElementById('cover-container');
    const feedContainer = document.getElementById('feed-container');
    const mainCoverImg = document.getElementById('main-cover');
    const likeBtn = document.getElementById('like-btn');
    
    // State
    let tracks = [];
    let playedHistory = [];
    let likedTracks = new Map();
    let currentIndex = -1;
    let isTransitioning = false;
    let easterEggMode = false; // Für Hänno & Snake16 Wackel-Effekt
    
    // History & Blacklist
    let globalPlayedIds = new Set(); 
    let dislikedArtists = new Set(); 

    // Swipe State
    let startY = 0;
    let startX = 0;
    let isDragging = false;
    let lastTapTime = 0;

    // Web Audio API
    let audioCtx, analyser, dataArray;

    // --- HELPER FÜR DAS E-TAG ---
    function getExplicitTag(track) {
        const isExp = (track.trackExplicitness && track.trackExplicitness.toLowerCase() === 'explicit') || 
                      (track.collectionExplicitness && track.collectionExplicitness.toLowerCase() === 'explicit');
        return isExp ? '<span class="explicit-tag">E</span>' : '';
    }

    async function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        
        const savedLikes = localStorage.getItem('musicback_likes');
        if(savedLikes) {
            const parsed = JSON.parse(savedLikes);
            parsed.forEach(track => likedTracks.set(track.trackId, track));
        }
        
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(player);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            drawVisualizer();
        }
        
        setupMediaSession();
        await loadMusic('Top Hits'); 
    }

    function setupMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { player.play(); updateMediaSessionState(); });
            navigator.mediaSession.setActionHandler('pause', () => { player.pause(); updateMediaSessionState(); });
            navigator.mediaSession.setActionHandler('previoustrack', playPrevTrack);
            navigator.mediaSession.setActionHandler('nexttrack', playNextTrack);
            navigator.mediaSession.setActionHandler('seekto', (details) => {
                if (details.fastSeek && 'fastSeek' in player) player.fastSeek(details.seekTime);
                else player.currentTime = details.seekTime;
            });
        }
    }

    function updateMediaSessionState() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.playbackState = player.paused ? 'paused' : 'playing';
        }
    }

    async function loadMusic(searchTerm) {
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&entity=song&limit=200&country=DE`);
            const data = await res.json();
            
            const unwantedKeywords = ['christmas', 'xmas', 'holiday', 'weihnacht', 'weihnachten', 'santa', 'snow', 'jingle', 'claus', 'navidad', 'merry', 'winter', 'bollywood', 'indian', 'hindi'];
            
            tracks = data.results.filter(t => {
                if (!t.previewUrl) return false;
                const textToCheck = (t.trackName + " " + t.artistName + " " + (t.primaryGenreName || "")).toLowerCase();
                if (unwantedKeywords.some(keyword => textToCheck.includes(keyword))) {
                    return false; 
                }
                return true; 
            });
            
            playNextTrack();
        } catch(e) {
            console.error("Laden fehlgeschlagen", e);
        }
    }

    async function handleSearch(e) {
        if (e.key === 'Enter') {
            const query = e.target.value.trim();
            if(!query) return;
            
            document.getElementById('search-input').blur();
            
            const resultsContainer = document.getElementById('search-results');
            const loader = document.getElementById('search-loader');
            
            resultsContainer.innerHTML = '';
            loader.style.display = 'block';

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=40&country=DE`);
                const data = await res.json();
                loader.style.display = 'none';
                
                const validResults = data.results.filter(t => t.previewUrl);
                
                if(validResults.length === 0) {
                    resultsContainer.innerHTML = '<p style="text-align:center; color:#aaa;">Keine Ergebnisse gefunden.</p>';
                    return;
                }

                let html = '';
                validResults.forEach(t => {
                    const explicitTag = getExplicitTag(t);
                    html += `
                        <div class="list-item" onclick='playSearchResult(${JSON.stringify(t).replace(/'/g, "'")})'>
                            <img src="${t.artworkUrl100}">
                            <div class="list-item-info">
                                <b>${t.trackName} ${explicitTag}</b>
                                <small>${t.artistName}</small>
                            </div>
                        </div>
                    `;
                });
                resultsContainer.innerHTML = html;
                
            } catch(err) {
                loader.style.display = 'none';
                resultsContainer.innerHTML = '<p style="text-align:center; color:#ff3b30;">Fehler bei der Suche.</p>';
            }
        }
    }

    function playSearchResult(track) {
        toggleSearch(false);
        playSpecificTrack(track);
    }

    async function changeCategory(category, btnElement) {
        if(isTransitioning) return;
        
        document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
        btnElement.classList.add('active');
        
        applyMarquee('display-title', 'Lade neue Songs...');
        applyMarquee('display-artist', category);
        
        player.pause();
        isTransitioning = true;
        currentIndex = playedHistory.length - 1; 
        
        await loadMusic(category);
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!player.paused && !isDragging) {
            analyser.getByteFrequencyData(dataArray);
            
            if (allBars.length >= 6) {
                allBars[0].style.height = 10 + (dataArray[2] / 255) * 35 + 'px';
                allBars[1].style.height = 10 + (dataArray[4] / 255) * 35 + 'px';
                allBars[2].style.height = 10 + (dataArray[6] / 255) * 35 + 'px';
                allBars[3].style.height = 10 + (dataArray[6] / 255) * 35 + 'px';
                allBars[4].style.height = 10 + (dataArray[4] / 255) * 35 + 'px';
                allBars[5].style.height = 10 + (dataArray[2] / 255) * 35 + 'px';
            }
            
            let bass = dataArray[2] || 0;
            let glowSpread = 20 + (bass / 255) * 45; 
            let glowAlpha = 0.2 + (bass / 255) * 0.5;

            // --- EASTER EGG: HEFTIGES WACKELN + RGB GLOW ---
            if (easterEggMode) {
                if (bass > 215) { // Bass ist extrem laut
                    const intensity = bass - 215; 
                    const x = (Math.random() - 0.5) * intensity * 1.5;
                    const y = (Math.random() - 0.5) * intensity * 1.5;
                    feedContainer.style.transform = `translate(${x}px, ${y}px)`;
                    
                    // RGB Eskalation beim Cover & Bars
                    const r = Math.floor(Math.random() * 255);
                    const g = Math.floor(Math.random() * 255);
                    const b = Math.floor(Math.random() * 255);
                    mainCoverImg.style.boxShadow = `0 15px ${glowSpread * 2}px rgba(${r}, ${g}, ${b}, 0.9)`;
                    allBars.forEach(bar => bar.style.backgroundColor = `rgb(${r},${g},${b})`);
                } else {
                    // Normalisieren wenn Bass gerade ruhig ist
                    feedContainer.style.transform = `translate(0, 0)`;
                    mainCoverImg.style.boxShadow = `0 15px ${glowSpread}px rgba(29, 185, 84, ${glowAlpha})`;
                    allBars.forEach(bar => bar.style.backgroundColor = `rgba(255,255,255,0.8)`);
                }
            } else {
                // Normales Verhalten für alle anderen Songs
                feedContainer.style.transform = `translate(0, 0)`;
                mainCoverImg.style.boxShadow = `0 15px ${glowSpread}px rgba(29, 185, 84, ${glowAlpha})`;
                allBars.forEach(bar => bar.style.backgroundColor = `rgba(255,255,255,0.8)`);
            }
            
        } else if (player.paused) {
            allBars.forEach(bar => {
                bar.style.height = '10px';
                bar.style.backgroundColor = `rgba(255,255,255,0.8)`;
            });
            feedContainer.style.transform = `translate(0, 0)`;
            mainCoverImg.style.boxShadow = `0 15px 40px rgba(0,0,0,0.6)`;
        }
    }

    function playNextTrack() {
        if (currentIndex < playedHistory.length - 1 && !isTransitioning) {
            currentIndex++;
            loadTrackIntoUI(playedHistory[currentIndex]);
        } else {
            if(tracks.length === 0) return;
            isTransitioning = false; 
            
            let availableTracks = tracks.filter(t => 
                !globalPlayedIds.has(t.trackId) && 
                !dislikedArtists.has(t.artistName) 
            );
            
            if (availableTracks.length === 0) {
                globalPlayedIds.clear(); 
                availableTracks = tracks.filter(t => !dislikedArtists.has(t.artistName));
            }

            if(availableTracks.length === 0) availableTracks = tracks; 

            const newTrack = availableTracks.splice(Math.floor(Math.random() * availableTracks.length), 1)[0];
            
            globalPlayedIds.add(newTrack.trackId);
            playedHistory.push(newTrack);
            currentIndex++;
            loadTrackIntoUI(newTrack);
        }
    }

    function playPrevTrack() {
        if (isTransitioning || currentIndex <= 0) return;
        currentIndex--;
        loadTrackIntoUI(playedHistory[currentIndex]);
    }

    function playSpecificTrack(track) {
        if (isTransitioning) return;
        let index = playedHistory.findIndex(t => t.trackId === track.trackId);
        
        if (index !== -1) {
            currentIndex = index;
        } else {
            globalPlayedIds.add(track.trackId);
            playedHistory.push(track);
            currentIndex = playedHistory.length - 1;
        }
        
        loadTrackIntoUI(track);
        toggleHistory(false);
        toggleLikes(false);
    }

    function applyMarquee(elementId, text) {
        const container = document.getElementById(elementId).parentElement;
        const el = document.getElementById(elementId);
        
        el.classList.remove('marquee-active');
        el.innerHTML = text; 
        
        setTimeout(() => {
            if (el.scrollWidth > container.clientWidth) {
                el.innerHTML = `${text} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${text}`;
                el.classList.add('marquee-active');
            }
        }, 50);
    }

    function loadTrackIntoUI(track) {
        isTransitioning = true;
        const infoSection = document.getElementById('info-section');
        const bgBlur = document.getElementById('bg-blur');

        // Check für das Wackel-Easter-Egg
        const tName = (track.trackName || '').toLowerCase();
        const aName = (track.artistName || '').toLowerCase();
        easterEggMode = (tName.includes('backfisch') && aName.includes('snake')) || 
                        (tName.includes('goldene gans') && (aName.includes('hänno') || aName.includes('noon') || aName.includes('hand')));

        if(likedTracks.has(track.trackId)) {
            likeBtn.classList.add('liked');
            likeBtn.classList.replace('far', 'fas');
        } else {
            likeBtn.classList.remove('liked');
            likeBtn.classList.replace('fas', 'far');
        }

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: track.trackName,
                artist: track.artistName,
                album: 'MusicBack',
                artwork: [
                    { src: track.artworkUrl100, sizes: '100x100', type: 'image/jpeg' },
                    { src: track.artworkUrl100.replace('100x100bb', '600x600bb'), sizes: '600x600', type: 'image/jpeg' }
                ]
            });
        }

        let vol = player.volume;
        const fadeOut = setInterval(() => {
            if (vol > 0.1) {
                vol -= 0.1;
                player.volume = vol;
            } else {
                clearInterval(fadeOut);
                player.pause();
                
                mainCoverImg.classList.add('fade-out');
                infoSection.style.opacity = '0';

                setTimeout(() => {
                    const art = track.artworkUrl100.replace('100x100bb', '600x600bb');
                    mainCoverImg.src = art;
                    bgBlur.style.backgroundImage = `url('${art}')`;
                    
                    document.getElementById('display-top-artist').innerText = track.artistName;
                    
                    const explicitTag = getExplicitTag(track);
                    applyMarquee('display-title', `${track.trackName} ${explicitTag}`);
                    applyMarquee('display-artist', track.artistName);

                    player.src = track.previewUrl;
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    
                    player.play().then(() => {
                        updateMediaSessionState();
                        if(document.getElementById('history-panel').classList.contains('active')) renderHistory();
                    }).catch(e => console.log("Autoplay blockiert", e));
                    
                    mainCoverImg.classList.remove('fade-out');
                    infoSection.style.opacity = '1';

                    let volIn = 0;
                    const fadeIn = setInterval(() => {
                        if (volIn < 0.9) {
                            volIn += 0.1;
                            player.volume = volIn;
                        } else {
                            player.volume = 1;
                            clearInterval(fadeIn);
                            isTransitioning = false;
                        }
                    }, 50);
                }, 400); 
            }
        }, 30); 
    }

    // --- GESTEN & SWIPES ---
    coverContainer.addEventListener('touchstart', e => {
        if (isTransitioning) return;
        startY = e.touches[0].clientY;
        startX = e.touches[0].clientX;
        isDragging = true;
        coverContainer.style.transition = 'none'; 
    });

    coverContainer.addEventListener('touchmove', e => {
        if (!isDragging || isTransitioning) return;
        const diffY = e.touches[0].clientY - startY;
        const diffX = e.touches[0].clientX - startX;
        coverContainer.style.transform = `translate(${diffX * 0.4}px, ${diffY * 0.6}px) scale(0.95)`;
    });

    coverContainer.addEventListener('touchend', e => {
        if (!isDragging) return;
        isDragging = false;
        const diffY = e.changedTouches[0].clientY - startY;
        const diffX = e.changedTouches[0].clientX - startX;
        
        coverContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
        coverContainer.style.transform = 'translate(0px, 0px) scale(1)';

        if (Math.abs(diffX) > Math.abs(diffY) && diffX > 90) {
            triggerThumbsDown();
        } 
        else if (diffY < -80) { 
            if (navigator.vibrate) navigator.vibrate(40); 
            playNextTrack();
        } 
        else if (diffY > 80 && currentIndex > 0) { 
            if (navigator.vibrate) navigator.vibrate(40);
            playPrevTrack();
        } 
        else if (Math.abs(diffY) < 10 && Math.abs(diffX) < 10) { 
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            if (tapLength < 300 && tapLength > 0) {
                toggleLike(null, true);
                triggerBigHeart();
            } else {
                setTimeout(() => {
                    if(new Date().getTime() - lastTapTime >= 300) togglePlayPause();
                }, 300);
            }
            lastTapTime = currentTime;
        }
    });

    function triggerThumbsDown() {
        if(currentIndex === -1) return;
        const currentTrack = playedHistory[currentIndex];
        
        dislikedArtists.add(currentTrack.artistName);
        
        const icon = document.getElementById('feedback-icon');
        icon.classList.add('show');
        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
        
        setTimeout(() => {
            icon.classList.remove('show');
            playNextTrack();
        }, 400);
    }

    function triggerBigHeart() {
        const heart = document.getElementById('big-heart-icon');
        heart.classList.remove('animate');
        void heart.offsetWidth; 
        heart.classList.add('animate');
    }

    function togglePlayPause() {
        if (isTransitioning) return;
        if (player.paused) {
            player.play();
            coverContainer.style.transform = "scale(1)";
        } else {
            player.pause();
            coverContainer.style.transform = "scale(0.92)"; 
        }
        updateMediaSessionState();
    }

    function toggleLike(e, isDoubleTap = false) {
        if(e) e.stopPropagation();
        if(currentIndex === -1) return;

        const track = playedHistory[currentIndex];
        const isLiked = likedTracks.has(track.trackId);

        if(isLiked && !isDoubleTap) {
            likedTracks.delete(track.trackId);
            likeBtn.classList.remove('liked');
            likeBtn.classList.replace('fas', 'far');
        } else if (!isLiked) {
            likedTracks.set(track.trackId, track);
            likeBtn.classList.add('liked');
            likeBtn.classList.replace('far', 'fas');
            if(navigator.vibrate && !isDoubleTap) navigator.vibrate([30, 50, 30]); 
        }

        localStorage.setItem('musicback_likes', JSON.stringify(Array.from(likedTracks.values())));
        if(document.getElementById('likes-panel').classList.contains('active')) renderLikes();
    }

    function removeFromLikes(trackId) {
        likedTracks.delete(trackId);
        localStorage.setItem('musicback_likes', JSON.stringify(Array.from(likedTracks.values())));
        renderLikes();
        if(playedHistory[currentIndex] && playedHistory[currentIndex].trackId === trackId) {
            likeBtn.classList.remove('liked');
            likeBtn.classList.replace('fas', 'far');
        }
    }

    async function downloadSong(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = `${filename}.m4a`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(a);
        } catch (err) {
            console.error(err);
            alert("Download fehlgeschlagen.");
        }
    }

    function shareTrack() {
        if (currentIndex === -1) return;
        const track = playedHistory[currentIndex];
        const spotifySearchUrl = `https://open.spotify.com/search/${encodeURIComponent(track.artistName + ' ' + track.trackName)}`;
        
        if (navigator.share) {
            navigator.share({
                title: track.trackName,
                text: `Hör dir ${track.trackName} von ${track.artistName} an!`,
                url: spotifySearchUrl 
            }).catch(err => console.log('Teilen abgebrochen', err));
        } else {
            alert("Teilen wird auf diesem Gerät leider nicht unterstützt.");
        }
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        let html = '';
        
        for (let i = playedHistory.length - 1; i >= 0; i--) {
            const t = playedHistory[i];
            const isPlayingNow = (i === currentIndex && !player.paused);
            const isActiveClass = isPlayingNow ? 'active-history-item' : '';
            const explicitTag = getExplicitTag(t);

            html += `
                <div class="vinyl-item ${isActiveClass}" onclick='playSpecificTrack(${JSON.stringify(t).replace(/'/g, "'")})'>
                    <div class="vinyl-disc"></div>
                    <img class="vinyl-sleeve" src="${t.artworkUrl100}">
                    <div class="vinyl-info">
                        <b>${t.trackName} ${explicitTag}</b>
                        <small>${t.artistName}</small>
                    </div>
                </div>
            `;
        }
        list.innerHTML = html || '<p style="text-align:center; color:#aaa; margin-top:30px;">Noch keine Platten gehört.</p>';
    }

    function renderLikes() {
        const list = document.getElementById('likes-list');
        let html = '';
        const tracksArray = Array.from(likedTracks.values()).reverse();
        
        tracksArray.forEach(t => {
            const explicitTag = getExplicitTag(t);
            const safeTrackName = t.trackName.replace(/'/g, ""); 
            const safeArtistName = t.artistName.replace(/'/g, "");

            html += `
                <div class="list-item">
                    <img src="${t.artworkUrl100}" onclick='playSpecificTrack(${JSON.stringify(t).replace(/'/g, "'")})'>
                    <div class="list-item-info" onclick='playSpecificTrack(${JSON.stringify(t).replace(/'/g, "'")})'>
                        <b>${t.trackName} ${explicitTag}</b>
                        <small>${t.artistName}</small>
                    </div>
                    <div class="list-actions">
                        <i class="fas fa-download list-btn" onclick="downloadSong('${t.previewUrl}', '${safeArtistName} - ${safeTrackName}')"></i>
                        <i class="fas fa-trash list-btn delete" onclick="removeFromLikes(${t.trackId})"></i>
                    </div>
                </div>
            `;
        });
        list.innerHTML = html || '<p style="text-align:center; color:#aaa; margin-top:30px;">Noch keine Favoriten.</p>';
    }

    function toggleSearch(show) {
        const panel = document.getElementById('search-panel');
        if(show) { 
            panel.classList.add('active'); 
            setTimeout(() => document.getElementById('search-input').focus(), 300);
        } else { 
            panel.classList.remove('active'); 
        }
    }

    function toggleHistory(show) {
        const panel = document.getElementById('history-panel');
        if(show) { renderHistory(); panel.classList.add('active'); } 
        else { panel.classList.remove('active'); }
    }

    function toggleLikes(show) {
        const panel = document.getElementById('likes-panel');
        if(show) { renderLikes(); panel.classList.add('active'); } 
        else { panel.classList.remove('active'); }
    }

    function triggerSpotify(event) {
        event.stopPropagation();
        player.pause();
        updateMediaSessionState();
        coverContainer.style.transform = "scale(0.92)";
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        player.play();
        updateMediaSessionState();
        coverContainer.style.transform = "scale(1)";
    }

    function confirmSpotify() {
        const track = playedHistory[currentIndex];
        const url = `spotify:search:${encodeURIComponent(track.artistName + ' ' + track.trackName)}`;
        window.open(url, '_blank');
        closeModal();
    }

    function seekSong(e) {
        if (!player.duration) return;
        const container = document.getElementById('progress-container');
        const rect = container.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percentage = clickX / rect.width;
        player.currentTime = percentage * player.duration;
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    player.ontimeupdate = () => {
        if (!player.duration) return;
        const p = (player.currentTime / player.duration) * 100;
        document.getElementById('progress-bar').style.width = p + '%';
        document.getElementById('time-display').innerText = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
        
        if ('mediaSession' in navigator && navigator.mediaSession.setPositionState) {
            try {
                navigator.mediaSession.setPositionState({
                    duration: player.duration || 30,
                    playbackRate: player.playbackRate,
                    position: player.currentTime
                });
            } catch (e) {}
        }
    };

    player.onended = playNextTrack;
    
    player.addEventListener('play', () => {
        updateMediaSessionState();
        if(document.getElementById('history-panel').classList.contains('active')) renderHistory();
    });
    player.addEventListener('pause', () => {
        updateMediaSessionState();
        if(document.getElementById('history-panel').classList.contains('active')) renderHistory();
    });
</script>
