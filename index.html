<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PodStream">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PodStream - Dein Podcast Hub</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-blue: #0A84FF;
            --ios-text: #FFFFFF;
            --ios-subtext: #8E8E93;
            --ios-separator: #38383A;
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(20, 20, 20, 0.7);
            --nav-item: rgba(255,255,255,0.5);
            --nav-active: #FFF;
            --radius-l: 32px;
            --radius-m: 18px;
            --header-height: 100px;
        }

        body.light-mode {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-text: #000000;
            --ios-subtext: #8E8E93;
            --ios-separator: #C6C6C8;
            --glass-border: 1px solid rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.75);
            --nav-item: rgba(0,0,0,0.4);
            --nav-active: #000;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            margin: 0; background: var(--ios-bg); color: var(--ios-text); 
            padding-bottom: 150px; overflow-x: hidden; -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }

        /* ANIMATIONS */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .animate-entry { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* HEADER */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            z-index: 1000; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .header-blur-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover !important; background-position: center !important;
            filter: blur(25px) brightness(0.4); opacity: 0; transition: opacity 0.5s; z-index: 1;
        }
        
        .logo { font-size: 34px; font-weight: 800; letter-spacing: -1px; position: relative; z-index: 2; transition: all 0.4s; }
        
        header.scrolled { height: 70px; background: var(--nav-bg); backdrop-filter: blur(20px); border-bottom: var(--glass-border); }
        header.scrolled .logo { opacity: 0; transform: translateY(-20px); }
        header.scrolled .header-blur-bg { opacity: 1; }

        /* STICKY BAR */
        .sticky-app-bar {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            z-index: 3; opacity: 0; transform: translateY(20px); transition: 0.4s; pointer-events: none;
        }
        header.scrolled .sticky-app-bar.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .sticky-icon { width: 40px; height: 40px; border-radius: 10px; margin-right: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* NOW PLAYING POPUP (VOLLBILD) */
        #player-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ios-bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box;
            animation: slideUp 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        .popup-close { position: absolute; top: 20px; right: 20px; font-size: 24px; opacity: 0.5; }
        .popup-art { width: 85vw; height: 85vw; max-width: 320px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 40px 0; }
        .popup-info { text-align: left; width: 100%; padding: 0 20px; }
        .popup-title { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .popup-author { color: var(--ios-blue); font-weight: 600; }
        
        .controls-main { display: flex; align-items: center; justify-content: center; gap: 40px; margin-top: 40px; width: 100%; }
        .play-btn-large { width: 80px; height: 80px; border-radius: 50%; background: var(--ios-text); color: var(--ios-bg); display: flex; justify-content: center; align-items: center; font-size: 30px; }
        
        .progress-container { width: 100%; padding: 0 20px; margin-top: 30px; box-sizing: border-box; }
        .seek-bar { width: 100%; -webkit-appearance: none; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none; }
        .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: white; border-radius: 50%; }

        /* CONTENT */
        .category-scroll { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; scrollbar-width: none; }
        .cat-pill { background: rgba(255,255,255,0.08); padding: 8px 18px; border-radius: 20px; font-size: 14px; white-space: nowrap; }
        .cat-pill.active { background: var(--ios-blue); color: white; }

        .featured-banner { margin: 20px; border-radius: var(--radius-l); height: 400px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; box-sizing: border-box; }
        .featured-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover !important; filter: brightness(0.6); z-index: -1; }

        .horizontal-scroll { display: flex; overflow-x: auto; padding: 0 20px 20px; gap: 18px; }
        .card-item { width: 140px; min-width: 140px; text-align: left; }
        .card-icon { width: 140px; height: 140px; border-radius: 28px; object-fit: cover; margin-bottom: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .app-list-container { background: var(--ios-card); margin: 0 20px; border-radius: var(--radius-m); padding: 0 16px; border: var(--glass-border); }
        .app-item { display: flex; padding: 15px 0; border-bottom: 0.5px solid var(--ios-separator); align-items: center; }
        .app-info { flex: 1; min-width: 0; }
        .play-badge { background: #333; color: var(--ios-blue); padding: 6px 15px; border-radius: 20px; font-weight: 800; font-size: 11px; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 240px; height: 74px; background: var(--nav-bg); backdrop-filter: blur(30px);
            border-radius: 37px; display: flex; justify-content: space-evenly; align-items: center;
            z-index: 4000; border: 1px solid rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bottom-nav.nav-scrolled { width: 140px; height: 55px; bottom: 20px; }
        .nav-item { color: var(--nav-item); text-align: center; }
        .nav-item.active { color: var(--ios-blue); }
        .nav-item i { font-size: 22px; display: block; }
        .nav-item span { font-size: 10px; font-weight: 700; margin-top: 4px; transition: 0.3s; }
        .bottom-nav.nav-scrolled span { display: none; }

        /* SEARCH OVERLAY */
        .search-bar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); z-index: 5000; display: none; padding-top: 60px; }
        .input-wrap { background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; padding: 12px; margin: 0 20px; }
        .input-wrap input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; font-size: 17px; }

        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--ios-blue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="player-popup">
    <i class="fas fa-chevron-down popup-close" onclick="closePlayer()"></i>
    <img id="pop-art" src="" class="popup-art">
    <div class="popup-info">
        <div id="pop-title" class="popup-title">Wähle eine Episode</div>
        <div id="pop-author" class="popup-author">Podcast</div>
    </div>
    
    <div class="progress-container">
        <input type="range" id="pop-seek" class="seek-bar" value="0" min="0" step="1">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:8px; opacity:0.5">
            <span id="time-cur">0:00</span>
            <span id="time-dur">0:00</span>
        </div>
    </div>

    <div class="controls-main">
        <i class="fas fa-backward-step" style="font-size:30px" onclick="skip(-15)"></i>
        <div class="play-btn-large" onclick="togglePlay()">
            <i id="pop-play-icon" class="fas fa-play"></i>
        </div>
        <i class="fas fa-forward-step" style="font-size:30px" onclick="skip(30)"></i>
    </div>
    <audio id="audio-engine" style="display:none"></audio>
</div>

<header id="main-header">
    <div class="header-blur-bg" id="header-blur"></div>
    <div class="logo">PodStream</div>
    
    <div class="sticky-app-bar" id="sticky-bar" onclick="openPlayer()">
        <img id="sticky-icon" src="" class="sticky-icon" onerror="this.src='https://via.placeholder.com/100'">
        <div style="flex:1; overflow:hidden">
            <div id="sticky-name" style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Nichts wird abgespielt</div>
            <div style="font-size:10px; opacity:0.6">JETZT HÖREN</div>
        </div>
        <div class="play-badge">ÖFFNEN</div>
    </div>
</header>

<div style="height:100px"></div>

<div id="content-main">
    <div class="category-scroll animate-entry">
        <div class="cat-pill active">Entdecken</div>
        <div class="cat-pill">True Crime</div>
        <div class="cat-pill">Comedy</div>
        <div class="cat-pill">Wissen</div>
    </div>

    <div id="featured-hero"></div>

    <div style="padding:20px; font-size:22px; font-weight:700">Angesagt</div>
    <div class="horizontal-scroll" id="scroll-trending"></div>

    <div id="episode-section" style="display:none">
        <div style="padding:20px; font-size:22px; font-weight:700">Episoden</div>
        <div id="episode-list" class="app-list-container"></div>
    </div>
</div>

<div id="search-overlay" class="search-bar">
    <div class="input-wrap">
        <i class="fas fa-search" style="color:var(--ios-subtext)"></i>
        <input type="text" id="search-input" placeholder="Podcasts suchen..." onkeyup="if(event.key==='Enter') searchPodcasts()">
        <span onclick="toggleSearch(false)" style="color:var(--ios-blue); margin-left:10px">Ende</span>
    </div>
    <div id="search-results" style="margin-top:20px; overflow-y:auto; height:80vh"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="location.reload()">
        <i class="fas fa-house"></i>
        <span>Home</span>
    </div>
    <div class="nav-item" onclick="toggleSearch(true)">
        <i class="fas fa-magnifying-glass"></i>
        <span>Suche</span>
    </div>
</nav>

<script>
    const audio = document.getElementById('audio-engine');
    let currentArt = "";

    function toggleSearch(show) {
        document.getElementById('search-overlay').style.display = show ? 'block' : 'none';
        if(show) document.getElementById('search-input').focus();
    }

    async function searchPodcasts() {
        const query = document.getElementById('search-input').value;
        const results = document.getElementById('search-results');
        results.innerHTML = '<div class="loader"></div>';
        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=podcast&limit=15`);
            const data = await resp.json();
            results.innerHTML = "";
            data.results.forEach(p => {
                results.innerHTML += `
                    <div class="app-item" style="margin:0 20px" onclick="loadEpisodes('${p.feedUrl}', '${p.artworkUrl600}', '${p.collectionName}')">
                        <img src="${p.artworkUrl100}" class="sticky-icon">
                        <div class="app-info">
                            <div style="font-weight:600">${p.collectionName}</div>
                            <div style="font-size:12px; opacity:0.6">${p.artistName}</div>
                        </div>
                    </div>`;
            });
        } catch (e) { results.innerHTML = "Fehler."; }
    }

    async function loadEpisodes(feedUrl, art, name) {
        toggleSearch(false);
        const list = document.getElementById('episode-list');
        document.getElementById('episode-section').style.display = "block";
        list.innerHTML = '<div class="loader"></div>';
        list.scrollIntoView({behavior: 'smooth'});

        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`);
            const d = await r.json();
            const xml = new DOMParser().parseFromString(d.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            list.innerHTML = "";
            currentArt = art;
            
            items.forEach((item, i) => {
                if(i > 15) return;
                const title = item.querySelector("title").textContent;
                const mp3 = item.querySelector("enclosure").getAttribute("url");
                list.innerHTML += `
                    <div class="app-item" onclick="playAudio('${mp3}', '${title.replace(/'/g, "")}', '${name}')">
                        <div class="app-info">
                            <div style="font-weight:600; font-size:15px">${title}</div>
                            <div style="font-size:12px; opacity:0.5">${name}</div>
                        </div>
                        <div class="play-badge">HÖREN</div>
                    </div>`;
            });
        } catch(e) { list.innerHTML = "Feed-Error."; }
    }

    function playAudio(url, title, author) {
        audio.src = url;
        audio.play();
        
        document.getElementById('pop-title').innerText = title;
        document.getElementById('pop-author').innerText = author;
        document.getElementById('pop-art').src = currentArt;
        document.getElementById('sticky-icon').src = currentArt;
        document.getElementById('sticky-name').innerText = title;
        document.getElementById('header-blur').style.backgroundImage = `url(${currentArt})`;
        document.getElementById('sticky-bar').classList.add('active');
        
        openPlayer();
        
        audio.ontimeupdate = () => {
            const seek = document.getElementById('pop-seek');
            seek.max = audio.duration;
            seek.value = audio.currentTime;
            document.getElementById('time-cur').innerText = formatTime(audio.currentTime);
            document.getElementById('time-dur').innerText = formatTime(audio.duration);
        };
        document.getElementById('pop-play-icon').className = "fas fa-pause";
    }

    function togglePlay() {
        const icon = document.getElementById('pop-play-icon');
        if(audio.paused) { audio.play(); icon.className = "fas fa-pause"; }
        else { audio.pause(); icon.className = "fas fa-play"; }
    }

    function skip(sec) { audio.currentTime += sec; }

    function formatTime(s) {
        if(isNaN(s)) return "0:00";
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60);
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function openPlayer() { document.getElementById('player-popup').style.display = 'flex'; }
    function closePlayer() { document.getElementById('player-popup').style.display = 'none'; }

    async function init() {
        const r = await fetch(`https://itunes.apple.com/search?term=podcast&limit=10&country=de`);
        const d = await r.json();
        
        const feat = d.results[0];
        document.getElementById('featured-hero').innerHTML = `
            <div class="featured-banner animate-entry" onclick="loadEpisodes('${feat.feedUrl}', '${feat.artworkUrl600}', '${feat.collectionName}')">
                <div class="featured-bg" style="background:url(${feat.artworkUrl600}) center/cover"></div>
                <div style="font-size:12px; font-weight:800; color:var(--ios-blue)">NEUE ENTDECKUNG</div>
                <div style="font-size:28px; font-weight:800">${feat.collectionName}</div>
                <div style="opacity:0.8">${feat.artistName}</div>
            </div>`;

        const trending = document.getElementById('scroll-trending');
        d.results.slice(1).forEach(p => {
            trending.innerHTML += `
                <div class="card-item animate-entry" onclick="loadEpisodes('${p.feedUrl}', '${p.artworkUrl600}', '${p.collectionName}')">
                    <img src="${p.artworkUrl600}" class="card-icon">
                    <div style="font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${p.collectionName}</div>
                </div>`;
        });
    }

    // SCROLL LOGIC (DownAPK Style)
    let lastST = 0;
    window.onscroll = () => {
        const h = document.getElementById('main-header');
        const nav = document.querySelector('.bottom-nav');
        let st = window.scrollY;

        if(st > 40) h.classList.add('scrolled');
        else h.classList.remove('scrolled');

        if(st > lastST && st > 100) nav.classList.add('nav-scrolled');
        else nav.classList.remove('nav-scrolled');
        lastST = st;
    };

    document.getElementById('pop-seek').oninput = (e) => audio.currentTime = e.target.value;

    init();
</script>
</body>
</html>
